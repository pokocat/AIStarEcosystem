  # ── 3.14 Appearance Forge ────────────────
  # AI 形象锻造炉。options / history / generate / blueprint 已实装；
  # save 为 2026-04-19 新增：把一次生成结果落库并为其关联一段短视频资产。
  # 当前 AI 视频生成尚未接入，后端从 demo 池（两个本地 showreel mp4）中随机挑一个
  # URL 写入 ForgeResult.videoUrl；接入后替换为真实生成管线回填。

  /appearance-forge/options:
    get:
      tags: [appearance-forge]
      operationId: getForgeOptions
      summary: 拉取锻造炉静态模版与下拉选项
      responses:
        '200':
          description: 模版 + 发型 / 瞳色 / 标签 / 面部滑块 / 主题配色清单
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/ForgeOptions' }

  /appearance-forge/history:
    get:
      tags: [appearance-forge]
      operationId: listForgeHistory
      summary: 列出指定艺人的历史生成记录
      parameters:
        - name: artistId
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 按 createdAt 倒序排列
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/ForgeResult' }

  /appearance-forge/generate:
    post:
      tags: [appearance-forge]
      operationId: generateForge
      summary: 提交一次锻造生成
      description: |
        mock / demo 实现同步返回合成结果；真实 AI 接入后建议改为异步任务壳。
        本接口只负责"产出候选"，真正入库固化调 /save。
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ForgeRequest' }
      responses:
        '201':
          description: 生成结果
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/ForgeResult' }

  /appearance-forge/save:
    post:
      tags: [appearance-forge]
      operationId: saveForgeResult
      summary: 保存一次锻造结果并为其关联短视频资产
      description: |
        把 /generate 产出的候选正式入库到艺人形象库，并分配一段可播放的短视频用于
        艺人详情页画廊的 3D 视频预览。

        **当前 fake 实现**：AI 视频生成尚未接入，后端维护一个固定的 demo 视频池
        （`/videos/showreel-01.mp4`、`/videos/showreel-02.mp4`，两个文件托管在
        前端 `apps/web/public/videos/` 下），每次保存随机挑一个 URL 写入
        `ForgeResult.videoUrl`。接入真实 AI 后替换为触发生成任务 + 落盘对象存储 +
        回填真实 URL 的完整管线。

        **幂等**：若目标 result 已有 videoUrl，保持不变直接返回；
        传 `reassign=true` 可强制重抽。

        **upsert**：若 `resultId` 未命中 DB 现有行，则按 body 其它字段新建
        （前端当前直接在本地合成候选、不先调 /generate 落库，因此 /save 兼做首次入库）。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resultId]
              properties:
                resultId:
                  type: string
                  description: ForgeResult.id；未命中现有行时作为新建记录的主键
                artistId:
                  type: string
                  description: upsert 新建场景下必填
                image:     { type: string }
                prompt:    { type: string }
                mode:      { $ref: '#/components/schemas/ForgeMode' }
                createdAt: { type: string, format: date-time }
                locked:    { type: array, items: { type: string } }
                reassign:
                  type: boolean
                  default: false
                  description: 若为 true 即使已有 videoUrl 也重抽一次
      responses:
        '200':
          description: 保存后的 ForgeResult（videoUrl 已填充）
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/ForgeResult' }
        '400':
          description: resultId 缺失
        '404':
          description: resultId 对应记录不存在

  /appearance-forge/blueprint:
    post:
      tags: [appearance-forge]
      operationId: saveForgeBlueprint
      summary: 把一次生成结果固化为艺人蓝图快照
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [artistId, resultId]
              properties:
                artistId: { type: string }
                resultId: { type: string }
                snapshot:
                  type: object
                  additionalProperties: true
                  description: 锁定字段 + 本次参数快照；未传时后端会把 body 中其它字段合入
      responses:
        '201':
          description: 蓝图已创建
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/ForgeBlueprint' }

