      responses:
        '200':
          description: 艺人数据分析
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/ArtistAnalytics' }

