  /admin/celebrity/templates/{id}:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    put:    { tags: [admin-celebrity], operationId: adminUpdateCelebrityTemplate, responses: { '200': { description: ok } } }
    delete: { tags: [admin-celebrity], operationId: adminDeleteCelebrityTemplate, responses: { '204': { description: ok } } }
