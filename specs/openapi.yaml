  /mixcut/drafts/{draftId}:
    parameters:
      - { in: path, name: draftId, required: true, schema: { type: string } }
    get:    { tags: [mixcut], operationId: getMixcutDraft,    responses: { '200': { description: ok } } }
    put:    { tags: [mixcut], operationId: upsertMixcutDraft, responses: { '200': { description: ok } } }
    delete: { tags: [mixcut], operationId: deleteMixcutDraft, responses: { '200': { description: ok } } }

  # 从实例生成任务。缺素材 → 409 MISSING_ASSETS（同 rerun，error.details.missing_assets[]）。
  # body 可空；仅 output_variants / perturbation_profile 可覆盖。
  /mixcut/drafts/{draftId}/generate:
    parameters:
      - { in: path, name: draftId, required: true, schema: { type: string } }
    post: { tags: [mixcut], operationId: generateMixcutJobFromDraft, responses: { '200': { description: ok } } }

