                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/SavedOutfit' }
    post:
      tags: [wardrobe]
      operationId: saveOutfit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [singerId, name, items]
              properties:
                singerId: { type: string, format: uuid }
                name:     { type: string }
                items:    { $ref: '#/components/schemas/EquippedItems' }
      responses:
        '201':
          description: 套装保存成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SavedOutfit' }

  /wardrobe/outfits/{id}:
    delete:
      tags: [wardrobe]
      operationId: deleteOutfit
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: 删除成功

