  /material/scripts:
    get: { tags: [material], operationId: materialListScripts, responses: { '200': { description: 当前用户可见 ScriptAsset[]（过滤 deleted_at） } } }
    post: { tags: [material], operationId: materialSaveScript, responses: { '200': { description: 保存脚本 ScriptAsset } } }
  /material/scripts/{id}:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    get: { tags: [material], operationId: materialGetScript, responses: { '200': { description: 单个脚本 ScriptAsset；已软删/无权访问返回 null } } }
    delete: { tags: [material], operationId: materialDeleteScript, responses: { '204': { description: 软删除脚本（写 deleted_at，不物理删除） } } }
  /material/scripts/ai-draft:
    post: { tags: [material], operationId: materialAiDraftScripts, responses: { '200': { description: AI 起稿候选 ScriptAsset[]（不落库；LLM 失败回退内置占位池） } } }
  /material/scripts/{id}/variables:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    post: { tags: [material], operationId: materialExtractVariables, responses: { '200': { description: 脚本可替换变量 ScriptVariable[]（已过滤幻觉；失败/无权访问返回空，前端用正则兜底） } } }

  # ── 素材运营 · 带货视频生成（v0.41 新增；真实视频大模型 · 异步 submit + 轮询，见 MaterialVideoJobService） ──
  /material/videos/generate:
    post: { tags: [material], operationId: materialGenerateVideos, responses: { '200': { description: '提交一批生成任务（body={items:[...]}）→ 返回任务卡 MaterialVideo[]（status=rendering）；未配置视频大模型 → 503 VIDEO_NOT_CONFIGURED' } } }
  /material/videos/jobs:
    get:
      tags: [material]
      operationId: materialListVideoJobs
      parameters:
        - { in: query, name: script_id, schema: { type: string } }
        - { in: query, name: product_id, schema: { type: string } }
      responses: { '200': { description: 当前用户的视频生成任务 MaterialVideo[]（含 rendering/ready/failed） } }
  /material/videos/jobs/{id}:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    get: { tags: [material], operationId: materialGetVideoJob, responses: { '200': { description: 单个生成任务的最新状态 / 结果 MaterialVideo（前端独立轮询；非本人返回 null） } } }
  /material/viral-hits:
    get: { tags: [material], operationId: materialListViralHits, responses: { '200': { description: 用户主动提交链接后的历史爆款分析结果 ViralHit[]（不自动抓取平台列表） } } }
  /material/viral-hits/analyze-url:
    post: { tags: [material], operationId: materialAnalyzeViralUrl, responses: { '200': { description: '提交单条视频链接 → 解析可用 video_url → AI 拆解 ViralHit；body={url, platform?}' } } }

  # ── admin · products（商品库管理；v0.31 起承载所有写动作） ───────────────────────

  /admin/products:
    get:
      tags: [admin-products]
      operationId: adminListProducts
      parameters:
        - in: query
          name: category
          schema: { $ref: '#/components/schemas/ProductCategory' }
        - in: query
          name: q
          schema: { type: string }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Product' }
    post:
      tags: [admin-products]
      operationId: adminCreateProduct
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductInput' }
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Product' }

  /admin/products/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      tags: [admin-products]
      operationId: adminGetProduct
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Product' }
    patch:
      tags: [admin-products]
      operationId: adminUpdateProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Product' }
    delete:
      tags: [admin-products]
      operationId: adminDeleteProduct
      responses:
        '204': { description: deleted }

  /admin/products/from-link:
    post:
      tags: [admin-products]
      operationId: adminCreateProductFromLink
      summary: |
        v0.31+: 从抖音链接解析 + 落 Product + 把图片登记为
        MixcutAsset(subkind=product-photo, related_product_id=...)。
        admin 「📋 从抖音链接建档」入口调用；普通用户无此接口。
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductLinkParseRequest' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Product' }

  /admin/products/{id}/refresh-images:
    post:
      tags: [admin-products]
      operationId: adminRefreshProductImages
      summary: |
        v0.31+: 给已存在商品「刷新图片」—— 重新解析链接 + 回填 Product.images 快照 +
        追加 MixcutAsset(subkind=product-photo)。不会清掉旧 MixcutAsset 行。
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [registered]
                        properties:
                          registered: { type: integer, description: "新登记的 MixcutAsset 行数（0 = 解析失败 / 无图）" }

  /admin/products/extract-selling-points:
    post:
      tags: [admin-products]
      operationId: adminExtractSellingPoints
      summary: |
        v0.31+: LLM 卖点抽取（建档辅助）。仅 admin。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, link]
              properties:
                name: { type: string }
                link: { type: string }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [sellingPoints]
                        properties:
                          sellingPoints: { type: string }

  # ═══════════════════════════════════════════════════════════════════════
  # ▼ legacy 路径补齐（v1 起就在前端 api/*.ts 调用，但之前未入 openapi.yaml）
  # 这些路径没有展开 request/response schema —— 后续按领域逐步丰富即可。
  # CI 校验只关心「路径是否声明」，不要求每条都有完整 schema。
  # ═══════════════════════════════════════════════════════════════════════

  # ── coach（掌门人后台） ──────────────────────────

  /coach/artists:               { get: { tags: [coach], operationId: listCoachArtists,            responses: { '200': { description: ok } } } }
  /coach/revenue:               { get: { tags: [coach], operationId: getCoachRevenue,             responses: { '200': { description: ok } } } }
  /coach/distribution-queue:    { get: { tags: [coach], operationId: listCoachDistributionQueue,  responses: { '200': { description: ok } } } }
  /coach/copyright:             { get: { tags: [coach], operationId: listCoachCopyright,          responses: { '200': { description: ok } } } }
  /coach/copyright/pending:     { get: { tags: [coach], operationId: listCoachCopyrightPending,   responses: { '200': { description: ok } } } }
  /coach/category-distribution: { get: { tags: [coach], operationId: getCoachCategoryDistribution, responses: { '200': { description: ok } } } }

  # ── community（粉丝社群） ─────────────────────────

  /community/fan-tiers:    { get: { tags: [community], operationId: listFanTiers,    responses: { '200': { description: ok } } } }
  /community/fan-growth:   { get: { tags: [community], operationId: getFanGrowth,    responses: { '200': { description: ok } } } }
  /community/activities:   { get: { tags: [community], operationId: listActivities,  responses: { '200': { description: ok } } } }
  /community/events:       { get: { tags: [community], operationId: listEvents,      responses: { '200': { description: ok } } } }

  /community/posts:
    get:  { tags: [community], operationId: listPosts,  responses: { '200': { description: ok } } }
    post: { tags: [community], operationId: createPost, responses: { '201': { description: created } } }

  /community/events/{eventId}/rsvp:
    parameters:
      - { in: path, name: eventId, required: true, schema: { type: string } }
    post:   { tags: [community], operationId: rsvpEvent,    responses: { '204': { description: ok } } }
    delete: { tags: [community], operationId: cancelRsvp,   responses: { '204': { description: ok } } }

  # ── config（运行时配置字典） ──────────────────────

  /config/{key}:
    parameters:
      - { in: path, name: key, required: true, schema: { type: string } }
    get: { tags: [config], operationId: getConfigValue, responses: { '200': { description: ok } } }

  # ── distribution（v2 接口；与 v1 的 /distribution/channels 等并存） ──

  /distribution/platforms:        { get: { tags: [distribution], operationId: listDistributionPlatforms,    responses: { '200': { description: ok } } } }
  /distribution/content:          { get: { tags: [distribution], operationId: listDistributionContent,      responses: { '200': { description: ok } } } }
  /distribution/platform-views:   { get: { tags: [distribution], operationId: listDistributionPlatformViews, responses: { '200': { description: ok } } } }
  /distribution/connections:      { get: { tags: [distribution], operationId: listDistributionConnections,  responses: { '200': { description: ok } } } }

  /distribution/platforms/{platformId}/connection:
    parameters:
      - { in: path, name: platformId, required: true, schema: { type: string } }
    post:   { tags: [distribution], operationId: connectPlatform,    responses: { '200': { description: connected } } }
    delete: { tags: [distribution], operationId: disconnectPlatform, responses: { '204': { description: disconnected } } }

  # ── social-distribution（sau 集成：短视频分发） ─────────────────────────────
  # 用户绑定的社交账号 + 一键分发任务。详见 components/schemas 中 2.22 节。
  # storage_state (cookie) 在 server DB 加密，永不暴露到此处任何 DTO。

  /me/social-accounts:
    get:
      tags: [social-distribution]
      operationId: listMySocialAccounts
      summary: 当前用户的已绑定社交账号列表
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/SocialAccount' }

  /me/social-accounts/bind-init:
    post:
      tags: [social-distribution]
      operationId: initSocialAccountBind
      summary: 启动扫码绑定流程；后端调 sau-service 启 Playwright 取 QR
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SocialAccountBindInput' }
      responses:
        '200':
          description: 绑定会话已建立
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SocialAccountBindInit' }

  /me/social-accounts/bind-poll:
    get:
      tags: [social-distribution]
      operationId: pollSocialAccountBind
      summary: 轮询扫码状态；status==success 后落库 + 返回清洁版 SocialAccount
      parameters:
        - { in: query, name: ticket, required: true, schema: { type: string } }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SocialAccountBindPollResult' }

  /me/social-accounts/bind-interaction:
    post:
      tags: [social-distribution]
      operationId: submitSocialAccountBindInteraction
      summary: 提交账号绑定过程中的人机交互响应（短信验证码等）
      parameters:
        - { in: query, name: ticket, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  minLength: 1
                  maxLength: 32
      responses:
        '204': { description: sau-service 已接受验证码，前端继续 poll 绑定状态 }

  /me/social-accounts/bind-cancel:
    post:
      tags: [social-distribution]
      operationId: cancelSocialAccountBind
      summary: 用户取消扫码绑定；杀 sau-service 进行中的 playwright，并清掉 PENDING 行
      description: |
        前端在用户关闭/取消扫码弹窗时调用。后端会：
          1. 调 sau-service /login/cancel 关掉 playwright（chromium 进程立即退出）
          2. 若 ticket 对应的 SocialAccount 仍为 PENDING 且尚无密文 cookie，删行避免脏数据
              （已经翻 ACTIVE 的不动 —— 那是用户已经成功的账号）
        幂等：ticket 已过期/不存在/不属于当前用户均 204。
      parameters:
        - { in: query, name: ticket, required: true, schema: { type: string } }
      responses:
        '204': { description: ack（无 body） }

  /me/social-accounts/{id}:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
    delete:
      tags: [social-distribution]
      operationId: unbindSocialAccount
      summary: 解绑账号；DB 行连同密文 storage_state 一并删除
      responses:
        '204': { description: deleted }

  /me/social-accounts/{id}/verify:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
    post:
      tags: [social-distribution]
      operationId: verifySocialAccount
      summary: 用现有 cookie 跑一次验证；可能刷新或翻 expired
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SocialAccount' }

  /me/publish-jobs:
    get:
      tags: [social-distribution]
      operationId: listMyPublishJobs
      summary: 当前用户的分发任务列表
      parameters:
        - { in: query, name: projectId, required: false, schema: { type: string } }
        - { in: query, name: status,    required: false, schema: { type: string } }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/PublishJob' }
    post:
      tags: [social-distribution]
      operationId: createPublishJobs
      summary: 批量创建发布任务（status=queued，不扣费；每个 targets[] 元素产生一条 PublishJob）
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreatePublishJobInput' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/PublishJob' }

  /me/publish-jobs/{id}:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
    get:
      tags: [social-distribution]
      operationId: getPublishJob
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/PublishJob' }

  /me/publish-jobs/{id}/start:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
    post:
      tags: [social-distribution]
      operationId: startPublishJob
      summary: queued → uploading；本接口扣费（失败不退）
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/PublishJob' }

  /me/publish-jobs/{id}/cancel:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
    post:
      tags: [social-distribution]
      operationId: cancelPublishJob
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/PublishJob' }

  /me/publish-jobs/{id}/retry:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
    post:
      tags: [social-distribution]
      operationId: retryPublishJob
      summary: 失败任务重试；产生新一轮扣费
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/PublishJob' }

  /me/publish-jobs/{id}/interact:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
    post:
      tags: [social-distribution]
      operationId: submitPublishJobInteraction
      summary: 提交人机交互响应（短信验证码等）；仅在 awaiting_user 状态有效
      description: |
        当 PublishJob.status=awaiting_user 时，前端展示 interactionRequired 上下文
        让用户输入验证码；提交后 server 转发到 sau-service POST /tasks/{id}/interaction，
        sau-service 把 code 填入平台弹窗 → 弹窗关闭 → 上游 upload() 继续。
        本接口本身不改 status；后续 callback 推 status 回到 publishing/uploading。

        错误码：
          409 INTERACTION_NOT_PENDING — 任务当前不在 awaiting_user
          409 JOB_NOT_DISPATCHED      — 任务还没派到 sau-service（externalTaskId 为空）
          400 INTERACTION_CODE_BLANK  — code 为空
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  minLength: 1
                  maxLength: 32
                  description: 用户输入的内容；sms 类型时为 4-8 位数字
      responses:
        '200':
          description: 提交成功（PublishJob 仍为 awaiting_user，前端继续轮询）
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/PublishJob' }

  # v0.22: 分发中心「任务追踪」按 projectId 聚合 + 批量操作。
  # `mixcut-batch-...` 和 `manual-batch-...` 这两类自动生成的 projectId 都走这里。
  /me/publish-jobs/batches:
    get:
      tags: [social-distribution]
      operationId: listMyPublishJobBatches
      summary: 列出当前用户的发布批次摘要（按 projectId 聚合 + 服务端分页 + 最近活跃排序）
      description: |
        与 GET /me/publish-jobs 互补：那个返回扁平的 PublishJob 列表；
        本接口对 user 的所有 PublishJob 按 project_id 聚合，每页返回 N 个 batch summary
        + 每批 8 状态计数 + 调度时间区间 + 平台列表。
        前端「分发中心 → 任务追踪」用此渲染卡片网格。
      parameters:
        - { in: query, name: page, schema: { type: integer, default: 0 } }
        - { in: query, name: limit, schema: { type: integer, default: 20, maximum: 100 } }
      responses:
        '200':
          description: paginated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/PublishBatchSummary' }
                      pagination: { $ref: '#/components/schemas/PaginationMeta' }

  /me/publish-jobs/batches/{projectId}:
    parameters:
      - { in: path, name: projectId, required: true, schema: { type: string } }
    get:
      tags: [social-distribution]
      operationId: getMyPublishJobBatch
      summary: 取单个批次的最新汇总（drawer 头部用）
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/PublishBatchSummary' }
        '404': { description: batch not found or not owned }

  /me/publish-jobs/batches/{projectId}/cancel:
    parameters:
      - { in: path, name: projectId, required: true, schema: { type: string } }
    post:
      tags: [social-distribution]
      operationId: cancelMyPublishJobBatch
      summary: 取消整批：所有非终止态行 → cancelled
      description: |
        循环调用 PublishJobService.cancel() —— 保留每条的 best-effort sau.cancelTask
        + 事件流。已是 live/failed/cancelled 的不动。返回受影响 job 的最新 DTO 列表。
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/PublishJob' }

  /me/publish-jobs/batches/{projectId}/retry-failed:
    parameters:
      - { in: path, name: projectId, required: true, schema: { type: string } }
    post:
      tags: [social-distribution]
      operationId: retryFailedMyPublishJobBatch
      summary: 重试整批失败任务（每条扣费一次，与单条 retry 等价）
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/PublishJob' }

  /me/publish-jobs/batches/{projectId}/reschedule:
    parameters:
      - { in: path, name: projectId, required: true, schema: { type: string } }
    post:
      tags: [social-distribution]
      operationId: rescheduleMyPublishJobBatch
      summary: 重新调度未开始（status=queued）的子集，应用新的 ScheduleSpec
      description: |
        仅对 status=queued 的子集生效；已开始 / 终态行原样保留。
        ScheduleSpec 共用 mixcut 批量发布的同一 sealed union（immediate/single/daily_recurring）。
        服务端 ScheduleExpander 把 spec 展开成 N=queuedCount 长的 Instant[]，按 createdAt asc
        顺序把 scheduledAt 注入每条 queued job；PublishJobScheduler 下个 tick 自然拾起。

        错误码：
          409 NO_QUEUED_JOBS    — 该批次没有待派单任务可重新调度
          400 SCHEDULE_REQUIRED — body 缺 schedule
          400 SCHEDULE_INVALID  — 未知 strategy
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RescheduleBatchInput' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/PublishJob' }

  /internal/sau/job-callback:
    post:
      tags: [social-distribution]
      operationId: sauJobCallback
      summary: sau-service → server 的任务进度回调（受 X-Internal-Secret 保护）
      description: |
        内部 endpoint：仅 sau-service 在 k8s 同 namespace 内可访问，
        受 InternalAuthFilter (`X-Internal-Secret`) 校验。以 externalTaskId 幂等。
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PublishJobCallback' }
      responses:
        '200': { description: ok }
        '401': { description: invalid internal secret }

