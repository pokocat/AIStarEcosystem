        coverUrl:      { type: string, nullable: true }
        lyrics:        { type: string, nullable: true }
        modelVersion:  { type: string, nullable: true }
        thinkDepth:    { $ref: '#/components/schemas/ThinkDepth' }
        creditsSpent:  { type: integer, description: 创作消耗积分 }
