      tags: [tracks]
      operationId: deleteTrack
      responses:
        '200':
          description: 删除成功

  /tracks/{id}/publish:
    post:
      tags: [tracks]
      operationId: publishTrack
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: 发布成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Track' }

