      tags: [tracks]
      operationId: updateTrack
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:    { type: string }
                coverUrl: { type: string, format: uri }
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Track' }
