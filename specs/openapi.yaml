        schema: { type: string, format: uuid }
    get:
      tags: [tracks]
      operationId: getTrack
      responses:
        '200':
          description: 曲目详情（含歌词）
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Track' }
