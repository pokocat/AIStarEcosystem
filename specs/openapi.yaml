                      data: { $ref: '#/components/schemas/ProductLinkInfo' }
        '422':
          description: 未能从该链接解析出商品信息（不支持的平台 / 页面格式变更）
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

