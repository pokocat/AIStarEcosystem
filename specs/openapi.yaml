  # v0.31+ 手机号 + SMS 验证码 登录 / 注册（三个新 web app + 小程序入口）
  /auth/sms/request-code:
    post:
      tags: [auth]
      operationId: smsRequestCode
      security: []
      summary: 请求短信验证码（登录 / 注册模板分离；速率限制 60s/次；连错 5 次锁定 30 分钟）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone: { type: string, description: 11 位国内手机号 }
                purpose:
                  type: string
                  enum: [login, register]
                  default: login
                  description: 验证码用途；login 使用登录模板 SMS_507065062，register 使用注册模板
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          sent: { type: boolean }
        '400': { description: 手机号格式错误 }
        '429': { description: 速率限制 / 已锁定 }

  /auth/sms/verify:
    post:
      tags: [auth]
      operationId: smsLogin
      security: []
      summary: 手机号 + 验证码 登录（用户必须已注册）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, code]
              properties:
                phone: { type: string }
                code: { type: string, description: 6 位数字 }
      responses:
        '200':
          description: 登录成功，返回 token + user
        '400': { description: 验证码错误 / 过期 }
        '404': { description: USER_NOT_FOUND — 手机号未注册，需走 /auth/sms/register }
        '429': { description: 已锁定 }

  /auth/sms/register:
    post:
      tags: [auth]
      operationId: smsRegister
      security: []
      summary: 手机号 + 激活码 双因素注册（同时创建 STUDIO 账号 + 工作室 + 钱包）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, code, licenseKey, studioName]
              properties:
                phone: { type: string }
                code: { type: string, description: 短信验证码 }
                licenseKey: { type: string, description: License 激活码 }
                studioName: { type: string }
                displayName: { type: string }
                platform:
                  type: string
                  enum: [music, drama, celebrity]
