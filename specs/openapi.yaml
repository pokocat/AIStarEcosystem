  # 鉴权：/api/mixcut/** 全部 .authenticated()；dev profile 走 DevAutoAuthFilter 兜底。

  /mixcut/jobs:
    get:  { tags: [mixcut], operationId: listMixcutJobs,  responses: { '200': { description: ok } } }
    post: { tags: [mixcut], operationId: createMixcutJob, responses: { '200': { description: ok } } }

  /mixcut/jobs/{jobId}:
    parameters:
      - { in: path, name: jobId, required: true, schema: { type: string } }
    get: { tags: [mixcut], operationId: getMixcutJob, responses: { '200': { description: ok } } }

  /mixcut/jobs/{jobId}/progress:
    parameters:
      - { in: path, name: jobId, required: true, schema: { type: string } }
    patch: { tags: [mixcut], operationId: updateMixcutJobProgress, responses: { '200': { description: ok } } }

