openapi: 3.1.0
info:
  title: AI Star Eco API
  version: 1.0.0
  description: |
    AI Star Eco 平台前后端接口规范。
    所有 JSON 字段使用 camelCase。后端 Spring Boot 通过
    `spring.jackson.property-naming-strategy=LOWER_CAMEL_CASE` 对齐。

servers:
  - url: /api
    description: API base path

security:
  - bearerAuth: []

# ─────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ── Reusable response wrappers ──────────
  schemas:

    SuccessResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          description: 单条响应数据（类型由各接口具体指定）
        message:
          type: string
          example: 操作成功

    PaginationMeta:
      type: object
      required: [page, limit, total, totalPages, hasNext, hasPrev]
      properties:
        page:       { type: integer, example: 1 }
        limit:      { type: integer, example: 20 }
        total:      { type: integer, example: 100 }
        totalPages: { type: integer, example: 5 }
        hasNext:    { type: boolean }
        hasPrev:    { type: boolean }

    ErrorDetail:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: 业务错误码（英文大写下划线）
          example: SINGER_NOT_FOUND
        message:
          type: string
          description: 用户友好错误信息（中文）
          example: 歌手不存在
        messageEn:
          type: string
          example: Singer not found
        details:
          description: 附加错误详情

    ErrorResponse:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          example: false
        error:
          $ref: '#/components/schemas/ErrorDetail'

    AdminAuthUser:
      type: object
      required: [id, username, displayName, role, status, accountSource]
      properties:
        id:            { type: string }
        username:      { type: string }
        email:         { type: string, nullable: true }
        displayName:   { type: string, nullable: true }
        role:          { type: string, enum: [super_admin, operator] }
        status:        { type: string, enum: [active, suspended] }
        accountSource: { type: string, enum: [admin, operator], description: admin_users 或 AepUser.operatorRole 登录来源 }
        createdAt:     { type: string, format: date-time, nullable: true }
        updatedAt:     { type: string, format: date-time, nullable: true }
        lastLoginAt:   { type: string, format: date-time, nullable: true }

    AsyncJobStarted:
      type: object
      required: [jobId, status, pollUrl, pollIntervalMs]
      properties:
        jobId:           { type: string, format: uuid }
        status:          { type: string, enum: [queued] }
        pollUrl:         { type: string }
        pollIntervalMs:  { type: integer, example: 2000 }
        estimatedSeconds: { type: integer }

    # ── Enums ───────────────────────────────

    UserRole:
      type: string
      enum: [fan, producer, coach]
      description: |
        fan=粉丝（星际听众）
        producer=制作人（造梦架构师）
        coach=掌门人（生态领航员）

    PlanType:
      type: string
      enum: [free, pro, enterprise]

    SingerStatus:
      type: string
      enum: [active, draft, archived]

    SingerQuality:
      type: string
      enum: [common, rare, epic, legendary]
      description: |
        common=普通(灰色,⭐⭐)
        rare=稀有(蓝色,⭐⭐⭐)
        epic=史诗(紫色,⭐⭐⭐⭐)
        legendary=传说(金色,⭐⭐⭐⭐⭐+皇冠)

    ClothingCategory:
      type: string
      enum: [top, bottom, accessory, shoes, hair, outfit]

    PoseCategory:
      type: string
      enum: [standing, sitting, dancing, singing, action]

    PoseDifficulty:
      type: string
      enum: [easy, medium, hard]

    ExpressionCategory:
      type: string
      enum: [happy, sad, cool, surprised, other]

    TrackStatus:
      type: string
      deprecated: true
      description: |
        legacy 枚举，与前端 SongStatus 不一致。前端真值源是 SongStatus
        (recording|mixing|released)；TrackStatus 仅保留作 v1 接口兼容。
      enum: [draft, processing, published]

    SongStatus:
      type: string
      description: |
        歌曲生命周期状态。前端 src/types/music.ts 真值源。
        - recording: 正在生成 / 录制
        - mixing:    待审核 / 后期
        - released:  已发布
      enum: [recording, mixing, released]

    ConcertStatus:
      type: string
      enum: [upcoming, live, ended]

    ThinkDepth:
      type: string
      description: AI 创作时的思考深度（影响积分扣费与生成耗时）
      enum: [shallow, normal, deep]

    GenerationMode:
      type: string
      enum:
        [text, melody, advanced, interactive, lyrics, inspiration,
         image, remix, fun, acrostic, gift]

    GenerationStage:
      type: string
      enum: [analyzing, composing, arranging, mixing, mastering, finalizing]

    MintStatus:
      type: string
      enum: [pending, minting, success, failed]

    MintStage:
      type: string
      enum: [preparing, ipfsUpload, contractCall, confirming, completed]

    WalletType:
      type: string
      enum: [metamask, walletconnect, coinbase]

    NFTRarity:
      type: string
      enum: [common, rare, epic, legendary]

    TransactionType:
      type: string
      enum:
        [royalty, nftSale, tip, signingFee, withdrawal,
         aiCredit, distribution, platformFee]

    TransactionDirection:
      type: string
      enum: [in, out]

    TransactionStatus:
      type: string
      enum: [pending, completed, failed]

    LicenseType:
      type: string
      enum: [exclusive, nonExclusive]

    ListingStatus:
      type: string
      enum: [pending, active, sold, removed]

    TraineeStatus:
      type: string
      enum: [active, inactive, graduated]

    ChartTrend:
      type: string
      enum: [up, down, same]

    DistributionChannelId:
      type: string
      enum: [domestic, global, shortVideo]

    PlatformAccountKey:
      type: string
      enum:
        [distrokid, tencentMusic, neteaseMusic,
         spotifyArtists, douyinCreator, tiktokBusiness]

    DistributionJobStatus:
      type: string
      enum: [pending, processing, partial, completed, failed]

    # ── 2.1 User ────────────────────────────

    User:
      type: object
      required: [id, username, email, role, plan, credits, langPreference,
                 themePreference, createdAt, updatedAt]
      properties:
        id:              { type: string, format: uuid }
        username:
          type: string
          minLength: 3
          maxLength: 50
          description: 唯一，字母数字下划线
        email:
          type: string
          format: email
          maxLength: 100
        avatarUrl:       { type: string, format: uri, nullable: true }
        role:            { $ref: '#/components/schemas/UserRole' }
        plan:            { $ref: '#/components/schemas/PlanType' }
        credits:
          type: integer
          minimum: 0
          default: 100
        langPreference:
          type: string
          enum: [zh, en]
          default: zh
        themePreference:
          type: string
          default: cyberpunk
        walletAddress:   { type: string, nullable: true, description: ETH格式 }
        hasPassword:     { type: boolean, description: 当前账号是否已设置手机号密码登录的密码 }
        createdAt:       { type: string, format: date-time }
        updatedAt:       { type: string, format: date-time }

    # ── 2.3 PersonaParams ───────────────────

    PersonaParams:
      type: object
      required: [sweetness, energy, mystery]
      properties:
        sweetness:
          type: integer
          minimum: 0
          maximum: 100
          default: 70
        energy:
          type: integer
          minimum: 0
          maximum: 100
          default: 80
        mystery:
          type: integer
          minimum: 0
          maximum: 100
          default: 50

    # ── 2.2 Singer ──────────────────────────

    SingerStats:
      type: object
      required: [songs, fans, popularity]
      properties:
        songs:      { type: integer, minimum: 0, default: 0 }
        fans:       { type: integer, minimum: 0, default: 0 }
        popularity: { type: integer, minimum: 0, maximum: 100, default: 0 }

    EquippedItems:
      type: object
      properties:
        top:       { type: string, nullable: true, description: ClothingItem.id }
        bottom:    { type: string, nullable: true }
        accessory: { type: string, nullable: true }
        shoes:     { type: string, nullable: true }
        hair:      { type: string, nullable: true }

    SingerSummary:
      type: object
      required: [id, name, style, status, avatarUrl]
      properties:
        id:        { type: string, format: uuid }
        name:      { type: string, minLength: 1, maxLength: 100 }
        style:     { type: string, maxLength: 50 }
        status:    { $ref: '#/components/schemas/SingerStatus' }
        avatarUrl: { type: string, format: uri }

    SingerDetail:
      allOf:
        - $ref: '#/components/schemas/SingerSummary'
        - type: object
          required: [ownerId, quality, tags, parameters, equippedWardrobe,
                     isPublic, stats, createdAt, updatedAt]
          properties:
            ownerId:             { type: string, format: uuid }
            quality:             { $ref: '#/components/schemas/SingerQuality' }
            tags:
              type: array
              items: { type: string }
              maxItems: 10
              default: []
            parameters:          { $ref: '#/components/schemas/PersonaParams' }
            equippedWardrobe:    { $ref: '#/components/schemas/EquippedItems' }
            activePoseId:        { type: string, nullable: true }
            activeExpressionId:  { type: string, nullable: true }
            activeGesture:       { type: string, nullable: true }
            parentAId:           { type: string, nullable: true, description: 基因混合父本A }
            parentBId:           { type: string, nullable: true }
            geneticRatio:
              type: integer
              minimum: 0
              maximum: 100
              nullable: true
              description: 0=纯A，100=纯B
            isPublic:            { type: boolean, default: false }
            stats:               { $ref: '#/components/schemas/SingerStats' }
            createdAt:           { type: string, format: date-time }
            updatedAt:           { type: string, format: date-time }

    CreateSingerRequest:
      type: object
      required: [name, style, quality, parameters]
      properties:
        name:       { type: string, minLength: 1, maxLength: 100 }
        style:      { type: string, maxLength: 50 }
        quality:    { $ref: '#/components/schemas/SingerQuality' }
        tags:       { type: array, items: { type: string }, maxItems: 10 }
        parameters: { $ref: '#/components/schemas/PersonaParams' }
        officialIpId: { type: string, description: 使用官方IP模板时传入 }

    # ── 2.4 OfficialIP ──────────────────────

    OfficialIp:
      type: object
      required: [id, name, nameEn, avatarUrl, style, styleEn, rarity,
                 tags, presetParams, isActive, sortOrder, createdAt]
      properties:
        id:          { type: string, format: uuid }
        name:        { type: string }
        nameEn:      { type: string }
        avatarUrl:   { type: string, format: uri }
        style:       { type: string }
        styleEn:     { type: string }
        rarity:      { $ref: '#/components/schemas/SingerQuality' }
        tags:        { type: array, items: { type: string } }
        presetParams: { $ref: '#/components/schemas/PersonaParams' }
        isActive:    { type: boolean, default: true }
        sortOrder:   { type: integer }
        createdAt:   { type: string, format: date-time }

    # ── 2.5 Wardrobe ────────────────────────

    ClothingItem:
      type: object
      required: [id, name, nameEn, category, imageUrl, rarity, price,
                 tags, isLocked, isNew, isTrending, sortOrder, isActive, createdAt]
      properties:
        id:         { type: string }
        name:       { type: string }
        nameEn:     { type: string }
        category:   { $ref: '#/components/schemas/ClothingCategory' }
        imageUrl:   { type: string, format: uri }
        rarity:     { $ref: '#/components/schemas/SingerQuality' }
        price:
          type: integer
          minimum: 0
          maximum: 9999
        tags:       { type: array, items: { type: string } }
        isLocked:   { type: boolean, default: false }
        isNew:      { type: boolean, default: false }
        isTrending: { type: boolean, default: false }
        sortOrder:  { type: integer }
        isActive:   { type: boolean, default: true }
        createdAt:  { type: string, format: date-time }

    SavedOutfit:
      type: object
      required: [id, singerId, ownerId, name, items, createdAt]
      properties:
        id:        { type: string, format: uuid }
        singerId:  { type: string, format: uuid }
        ownerId:   { type: string, format: uuid }
        name:      { type: string }
        items:     { $ref: '#/components/schemas/EquippedItems' }
        createdAt: { type: string, format: date-time }

    UserWardrobeItem:
      type: object
      required: [id, userId, itemId, isFavorited, isUnlocked, acquiredAt]
      properties:
        id:          { type: string, format: uuid }
        userId:      { type: string, format: uuid }
        itemId:      { type: string }
        isFavorited: { type: boolean }
        isUnlocked:  { type: boolean }
        acquiredAt:  { type: string, format: date-time }

    # ── 2.6 Pose / Expression / Gesture ─────

    Pose:
      type: object
      required: [id, name, nameEn, category, thumbnailUrl, difficulty,
                 isLocked, isNew, sortOrder, isActive, createdAt]
      properties:
        id:           { type: string }
        name:         { type: string }
        nameEn:       { type: string }
        category:     { $ref: '#/components/schemas/PoseCategory' }
        thumbnailUrl: { type: string, format: uri }
        animationUrl: { type: string, format: uri, nullable: true, description: Phase 3预留 }
        difficulty:   { $ref: '#/components/schemas/PoseDifficulty' }
        isLocked:     { type: boolean }
        isNew:        { type: boolean }
        sortOrder:    { type: integer }
        isActive:     { type: boolean }
        createdAt:    { type: string, format: date-time }

    Expression:
      type: object
      required: [id, name, nameEn, emoji, defaultIntensity, category,
                 sortOrder, isActive]
      properties:
        id:               { type: string }
        name:             { type: string }
        nameEn:           { type: string }
        emoji:            { type: string }
        defaultIntensity:
          type: integer
          minimum: 0
          maximum: 100
          default: 80
        category:         { $ref: '#/components/schemas/ExpressionCategory' }
        sortOrder:        { type: integer }
        isActive:         { type: boolean }

    Gesture:
      type: object
      required: [id, name, nameEn, emoji, sortOrder, isActive]
      properties:
        id:        { type: string }
        name:      { type: string }
        nameEn:    { type: string }
        emoji:     { type: string }
        sortOrder: { type: integer }
        isActive:  { type: boolean }

    SingerPoseConfig:
      type: object
      required: [singerId, expressionIntensity, updatedAt]
      properties:
        singerId:            { type: string, format: uuid }
        poseId:              { type: string, nullable: true }
        expressionId:        { type: string, nullable: true }
        expressionIntensity:
          type: integer
          minimum: 0
          maximum: 100
          default: 80
        gestureId:           { type: string, nullable: true }
        updatedAt:           { type: string, format: date-time }

    # ── 2.7 Track ───────────────────────────

    LyricLine:
      type: object
      required: [time, text]
      properties:
        time:
          type: integer
          minimum: 0
          description: 时间偏移（秒），单调递增
        text:
          type: string
          minLength: 1
          maxLength: 200
        duration:
          type: integer
          nullable: true
          description: 该行时长（秒）

    Track:
      type: object
      required: [id, producerId, title, generationMode, status, playCount,
                 createdAt, updatedAt]
      properties:
        id:             { type: string, format: uuid }
        producerId:     { type: string, format: uuid }
        singerId:       { type: string, format: uuid, nullable: true }
        title:          { type: string, minLength: 1, maxLength: 200 }
        audioUrl:       { type: string, format: uri, nullable: true }
        coverUrl:       { type: string, format: uri, nullable: true }
        generationMode: { $ref: '#/components/schemas/GenerationMode' }
        prompt:         { type: string, nullable: true }
        style:          { type: string, maxLength: 100, nullable: true }
        bpm:
          type: integer
          minimum: 40
          maximum: 240
          nullable: true
        key:            { type: string, nullable: true, example: C }
        durationSec:
          type: integer
          minimum: 30
          maximum: 600
          default: 120
        lyrics:
          type: array
          items: { $ref: '#/components/schemas/LyricLine' }
          nullable: true
        status:    { $ref: '#/components/schemas/TrackStatus' }
        playCount: { type: integer, minimum: 0, default: 0 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    TrackSummary:
      type: object
      required: [id, title, style, durationSec, status, createdAt, playCount]
      properties:
        id:          { type: string, format: uuid }
        title:       { type: string }
        style:       { type: string }
        durationSec: { type: integer }
        status:      { $ref: '#/components/schemas/TrackStatus' }
        createdAt:   { type: string, format: date-time }
        playCount:   { type: integer }

    # ── 2.8 TrackGeneration ─────────────────

    TrackGenerationRequest:
      type: object
      required: [mode, prompt, durationSec]
      properties:
        singerId:           { type: string, format: uuid, nullable: true }
        mode:               { $ref: '#/components/schemas/GenerationMode' }
        title:              { type: string, nullable: true }
        prompt:             { type: string }
        style:              { type: string, nullable: true }
        durationSec:        { type: integer, minimum: 30, maximum: 600, default: 120 }
        bpm:                { type: integer, minimum: 40, maximum: 240, nullable: true }
        key:                { type: string, nullable: true }
        songStructure:      { type: string, nullable: true }
        mood:               { type: string, nullable: true }
        instruments:        { type: string, nullable: true }
        lyricsText:         { type: string, nullable: true, description: 歌词成歌模式 }
        melodyFileUrl:      { type: string, format: uri, nullable: true }
        referenceImageUrl:  { type: string, format: uri, nullable: true }
        originalSongRef:    { type: string, nullable: true }
        remixTarget:        { type: string, nullable: true }
        acrosticWord:
          type: string
          minLength: 1
          maxLength: 8
          nullable: true
        acrosticTopic:      { type: string, nullable: true }
        giftTo:             { type: string, nullable: true }
        giftOccasion:       { type: string, nullable: true }
        giftMessage:        { type: string, nullable: true }
        funTheme:           { type: string, nullable: true }
        corePhrase:         { type: string, nullable: true }

    TrackGenerationResponse:
      type: object
      required: [jobId, status, progress, currentStage]
      properties:
        jobId:            { type: string, format: uuid }
        status:
          type: string
          enum: [queued, processing, completed, failed]
        progress:         { type: integer, minimum: 0, maximum: 100 }
        currentStage:     { $ref: '#/components/schemas/GenerationStage' }
        track:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Track'
        errorMessage:     { type: string, nullable: true }
        estimatedSeconds: { type: integer, nullable: true }

    # ── 2.9 Lyrics (inline in Track) ────────
    # LyricLine already defined above

    # ── 2.10 NFT Collection ─────────────────

    NFTPerks:
      type: object
      required: [futureAirdrop, exclusiveAccess, meetupPriority]
      properties:
        futureAirdrop:    { type: boolean }
        exclusiveAccess:  { type: boolean }
        meetupPriority:   { type: boolean }

    NFTCollection:
      type: object
      required: [id, creatorId, trackId, name, supply, priceEth, royaltyPct,
                 rarity, enableAirdrop, perks, mintedCount, status, chain,
                 createdAt, updatedAt]
      properties:
        id:                   { type: string, format: uuid }
        creatorId:            { type: string, format: uuid }
        trackId:              { type: string, format: uuid }
        singerId:             { type: string, format: uuid, nullable: true }
        name:                 { type: string, maxLength: 100 }
        description:          { type: string, nullable: true }
        coverUrl:             { type: string, format: uri, nullable: true }
        supply:
          type: integer
          minimum: 1
          maximum: 10000
        priceEth:
          type: string
          description: decimal字符串，如 "0.05"
        royaltyPct:
          type: integer
          minimum: 0
          maximum: 100
          default: 10
        rarity:               { $ref: '#/components/schemas/NFTRarity' }
        enableAirdrop:        { type: boolean, default: false }
        perks:                { $ref: '#/components/schemas/NFTPerks' }
        contractAddress:      { type: string, nullable: true }
        tokenIdRangeStart:    { type: integer, nullable: true }
        tokenIdRangeEnd:      { type: integer, nullable: true }
        mintedCount:          { type: integer, minimum: 0, default: 0 }
        status:               { $ref: '#/components/schemas/MintStatus' }
        chain:                { type: string, default: ethereum }
        ipfsMetadataUrl:      { type: string, nullable: true }
        createdAt:            { type: string, format: date-time }
        updatedAt:            { type: string, format: date-time }

    NFTCollectionSummary:
      type: object
      required: [id, name, coverUrl, priceEth, remaining, rarity]
      properties:
        id:        { type: string, format: uuid }
        name:      { type: string }
        coverUrl:  { type: string, format: uri, nullable: true }
        priceEth:  { type: string, description: decimal字符串 }
        remaining: { type: integer }
        rarity:    { $ref: '#/components/schemas/NFTRarity' }
        trackId:   { type: string, format: uuid, nullable: true }

    NftMintRequest:
      type: object
      required: [trackId, collectionName, supply, priceEth, royaltyPct, rarity, enableAirdrop]
      properties:
        trackId:        { type: string, format: uuid }
        collectionName: { type: string }
        supply:         { type: integer, minimum: 1, maximum: 10000 }
        priceEth:       { type: number }
        royaltyPct:     { type: integer, minimum: 0, maximum: 100 }
        rarity:         { $ref: '#/components/schemas/NFTRarity' }
        enableAirdrop:  { type: boolean }

    # ── 2.11 NFTMintJob ─────────────────────

    NFTMintJob:
      type: object
      required: [id, collectionId, userId, walletAddress, walletType,
                 status, currentStage, createdAt]
      properties:
        id:            { type: string, format: uuid }
        collectionId:  { type: string, format: uuid }
        userId:        { type: string, format: uuid }
        walletAddress: { type: string }
        walletType:    { $ref: '#/components/schemas/WalletType' }
        status:        { $ref: '#/components/schemas/MintStatus' }
        currentStage:  { $ref: '#/components/schemas/MintStage' }
        txHash:        { type: string, nullable: true }
        gasFeeEth:     { type: string, nullable: true }
        errorMessage:  { type: string, nullable: true }
        createdAt:     { type: string, format: date-time }
        completedAt:   { type: string, format: date-time, nullable: true }

    # ── 2.12 Finance ────────────────────────

    Transaction:
      type: object
      deprecated: true
      description: |
        legacy /finance/transactions 接口的投影。前端真值源 src/types/finance.ts:Transaction
        实际只有 id/source/amount/date/status/type/userId 7 个字段。新代码请使用 LedgerEntry。
      required: [id, userId, type, direction, amount, currency, status,
                 description, createdAt]
      properties:
        id:          { type: string, format: uuid }
        userId:      { type: string, format: uuid }
        type:        { $ref: '#/components/schemas/TransactionType' }
        direction:   { $ref: '#/components/schemas/TransactionDirection' }
        amount:
          type: number
          description: 金额，精度2位
        currency:    { type: string, default: CNY }
        status:      { $ref: '#/components/schemas/TransactionStatus' }
        referenceId: { type: string, nullable: true }
        description: { type: string, maxLength: 200 }
        createdAt:   { type: string, format: date-time }

    WalletBalance:
      type: object
      required: [userId, available, pending, totalEarned, currency, updatedAt]
      properties:
        userId:       { type: string, format: uuid }
        available:    { type: number }
        pending:      { type: number }
        totalEarned:  { type: number }
        currency:     { type: string, default: CNY }
        updatedAt:    { type: string, format: date-time }

    # ── 2.13 Earnings Chart ─────────────────

    EarningDataPoint:
      type: object
      required: [period, songRevenue, badgeRevenue]
      properties:
        period:
          type: string
          description: 时间周期标识，如 "2026-W14" 或 "2026-04" 或 "1"~"7"
        songRevenue:   { type: number, description: 流媒体版税收益 }
        badgeRevenue:  { type: number, description: NFT勋章收益 }

    DashboardStats:
      type: object
      required: [userId, ecoValue, estimatedRoyalty, badgeHolders,
                 totalStreams, totalFans, updatedAt]
      properties:
        userId:           { type: string, format: uuid }
        ecoValue:         { type: number, description: 生态估值（元）}
        estimatedRoyalty: { type: number, description: 预估版税（元）}
        badgeHolders:     { type: integer }
        totalStreams:      { type: integer }
        totalFans:         { type: integer }
        updatedAt:         { type: string, format: date-time }

    # ── 2.14 MarketplaceArtist ──────────────

    MarketplaceArtist:
      type: object
      required: [id, singerId, sellerId, name, avatarUrl, style, signingPrice,
                 songsCount, followersCount, creatorUsername, licenseType,
                 enableAutoReply, status, views, inquiries, createdAt, updatedAt]
      properties:
        id:               { type: string, format: uuid }
        singerId:         { type: string, format: uuid }
        sellerId:         { type: string, format: uuid }
        name:             { type: string }
        avatarUrl:        { type: string, format: uri }
        style:            { type: string }
        signingPrice:
          type: integer
          minimum: 1
          default: 8800
          description: 签约价格（元），建议范围 5000–15000
        description:      { type: string, nullable: true }
        songsCount:       { type: integer }
        followersCount:   { type: integer }
        creatorUsername:  { type: string }
        licenseType:      { $ref: '#/components/schemas/LicenseType' }
        enableAutoReply:  { type: boolean }
        status:           { $ref: '#/components/schemas/ListingStatus' }
        views:            { type: integer, default: 0 }
        inquiries:        { type: integer, default: 0 }
        createdAt:        { type: string, format: date-time }
        updatedAt:        { type: string, format: date-time }

    # ── 2.14 ArtistAnalytics ────────────────

    RecentSong:
      type: object
      required: [id, title, plays, date, duration]
      properties:
        id:       { type: string, format: uuid }
        title:    { type: string }
        plays:    { type: integer }
        date:     { type: string, format: date }
        duration: { type: string, example: "3:45" }

    ArtistAnalytics:
      type: object
      required: [singerId, totalSongs, totalPlays, totalRevenue, avgPlayRate,
                 activeDays, recentSongs, fanGrowthData, playTrendData, updatedAt]
      properties:
        singerId:       { type: string, format: uuid }
        totalSongs:     { type: integer }
        totalPlays:     { type: integer }
        totalRevenue:   { type: number }
        avgPlayRate:    { type: number, minimum: 0, maximum: 100 }
        activeDays:     { type: integer }
        recentSongs:
          type: array
          items: { $ref: '#/components/schemas/RecentSong' }
        fanGrowthData:
          type: array
          items: { type: integer }
          description: 7天粉丝增长趋势
        playTrendData:
          type: array
          items: { type: integer }
          description: 7天播放趋势
        updatedAt:      { type: string, format: date-time }

    # ── 2.15 SigningContract ────────────────

    SigningContract:
      type: object
      required: [id, listingId, buyerId, sellerId, singerId, signingPrice,
                 revenueSplitBuyer, revenueSplitSeller, termsAgreed,
                 paymentStatus, contractStatus, createdAt]
      properties:
        id:                  { type: string, format: uuid }
        listingId:           { type: string, format: uuid }
        buyerId:             { type: string, format: uuid }
        sellerId:            { type: string, format: uuid }
        singerId:            { type: string, format: uuid }
        signingPrice:        { type: number }
        revenueSplitBuyer:
          type: integer
          default: 70
          description: 买家收益分成比例%
        revenueSplitSeller:
          type: integer
          default: 30
          description: 卖家收益分成比例%
        termsAgreed:         { type: boolean }
        termsAgreedAt:       { type: string, format: date-time, nullable: true }
        paymentStatus:
          type: string
          enum: [pending, paid, refunded]
        contractStatus:
          type: string
          enum: [active, terminated]
        createdAt:           { type: string, format: date-time }
        activatedAt:         { type: string, format: date-time, nullable: true }

    # ── 2.16 ArtistListingRequest ───────────

    ArtistListingRequest:
      type: object
      required: [singerId, signingPrice, licenseType, enableAutoReply]
      properties:
        singerId:        { type: string, format: uuid }
        signingPrice:
          type: integer
          minimum: 1
          description: 建议范围 5000–15000
        description:
          type: string
          maxLength: 2000
          default: ""
        licenseType:     { $ref: '#/components/schemas/LicenseType' }
        enableAutoReply: { type: boolean }

    # ── 2.17 DistributionChannel ────────────

    DistributionChannel:
      type: object
      required: [id, name, nameEn, description, requiredAccounts, benefits,
                 benefitsEn, platformCount, isActive]
      properties:
        id:               { $ref: '#/components/schemas/DistributionChannelId' }
        name:             { type: string }
        nameEn:           { type: string }
        description:      { type: string }
        requiredAccounts:
          type: array
          items: { $ref: '#/components/schemas/PlatformAccountKey' }
        benefits:         { type: array, items: { type: string } }
        benefitsEn:       { type: array, items: { type: string } }
        platformCount:    { type: integer }
        isActive:         { type: boolean }

    # ── 2.18 PlatformAccount ────────────────

    PlatformAccount:
      type: object
      required: [id, userId, platformKey, connected, updatedAt]
      properties:
        id:             { type: string, format: uuid }
        userId:         { type: string, format: uuid }
        platformKey:    { $ref: '#/components/schemas/PlatformAccountKey' }
        connected:      { type: boolean }
        email:          { type: string, format: email, nullable: true }
        connectedAt:    { type: string, format: date-time, nullable: true }
        updatedAt:      { type: string, format: date-time }

    # ── 2.19 DistributionJob ────────────────

    PlatformResult:
      type: object
      required: [platformKey, channelId, status]
      properties:
        platformKey:   { $ref: '#/components/schemas/PlatformAccountKey' }
        channelId:     { $ref: '#/components/schemas/DistributionChannelId' }
        status:
          type: string
          enum: [success, failed, pending]
        trackUrl:      { type: string, format: uri, nullable: true }
        errorMessage:  { type: string, nullable: true }

    DistributionJob:
      type: object
      required: [id, producerId, trackId, selectedChannels, enablePreSave,
                 status, platformResults, submittedAt]
      properties:
        id:               { type: string, format: uuid }
        producerId:       { type: string, format: uuid }
        trackId:          { type: string, format: uuid }
        singerId:         { type: string, format: uuid, nullable: true }
        selectedChannels:
          type: array
          items: { $ref: '#/components/schemas/DistributionChannelId' }
        releaseDate:
          type: string
          format: date
          nullable: true
          description: null表示立即发行
        releaseTime:
          type: string
          nullable: true
          example: "18:00"
        enablePreSave:    { type: boolean, default: false }
        preSaveStartDays: { type: integer, default: 15 }
        status:           { $ref: '#/components/schemas/DistributionJobStatus' }
        platformResults:
          type: array
          items: { $ref: '#/components/schemas/PlatformResult' }
        submittedAt:      { type: string, format: date-time }
        completedAt:      { type: string, format: date-time, nullable: true }

    DistributionPublishRequest:
      type: object
      required: [trackId, channelIds]
      properties:
        trackId:        { type: string, format: uuid }
        channelIds:
          type: array
          items: { $ref: '#/components/schemas/DistributionChannelId' }
          minItems: 1
        releaseDate:    { type: string, format: date }
        releaseTime:    { type: string, example: "18:00" }
        preSaveEnabled: { type: boolean, default: false }

    # ── 2.20 ChartEntry ─────────────────────

    ChartEntry:
      type: object
      required: [id, chartId, trackId, singerId, title, artistName, coverUrl,
                 votes, trend, rank, updatedAt]
      properties:
        id:          { type: string, format: uuid }
        chartId:     { type: string, example: weekly_hot }
        trackId:     { type: string, format: uuid }
        singerId:    { type: string, format: uuid }
        title:       { type: string }
        artistName:  { type: string }
        coverUrl:    { type: string, format: uri }
        votes:       { type: integer, minimum: 0, default: 0 }
        trend:       { $ref: '#/components/schemas/ChartTrend' }
        rank:        { type: integer, minimum: 1 }
        prevRank:    { type: integer, nullable: true }
        updatedAt:   { type: string, format: date-time }

    VoteRecord:
      type: object
      required: [id, chartEntryId, userId, votedAt]
      properties:
        id:           { type: string, format: uuid }
        chartEntryId: { type: string, format: uuid }
        userId:       { type: string, format: uuid }
        votedAt:      { type: string, format: date-time }

    # ── 2.21 Coach / Trainee ────────────────

    CoachTrainee:
      type: object
      required: [id, coachId, traineeId, status, revenueSharePct,
                 joinedAt, updatedAt]
      properties:
        id:             { type: string, format: uuid }
        coachId:        { type: string, format: uuid }
        traineeId:      { type: string, format: uuid }
        status:         { $ref: '#/components/schemas/TraineeStatus' }
        revenueSharePct:
          type: integer
          minimum: 0
          maximum: 100
        joinedAt:       { type: string, format: date-time }
        updatedAt:      { type: string, format: date-time }

    TraineeKPI:
      type: object
      required: [traineeId, username, avatarUrl, status, weeklySongs,
                 weeklyProgress, weeklyRevenue, successRate, pendingReviews,
                 weekStart]
      properties:
        traineeId:       { type: string, format: uuid }
        username:        { type: string }
        avatarUrl:       { type: string, format: uri }
        status:          { $ref: '#/components/schemas/TraineeStatus' }
        weeklySongs:     { type: integer }
        weeklyProgress:  { type: integer, minimum: 0, maximum: 100 }
        weeklyRevenue:   { type: number }
        successRate:     { type: integer, minimum: 0, maximum: 100 }
        pendingReviews:  { type: integer }
        weekStart:       { type: string, format: date }

    SubmissionReview:
      type: object
      required: [id, coachId, traineeId, trackId, status, submittedAt]
      properties:
        id:             { type: string, format: uuid }
        coachId:        { type: string, format: uuid }
        traineeId:      { type: string, format: uuid }
        trackId:        { type: string, format: uuid }
        status:
          type: string
          enum: [pending, approved, rejected]
        reviewComment:  { type: string, nullable: true }
        submittedAt:    { type: string, format: date-time }
        reviewedAt:     { type: string, format: date-time, nullable: true }

    # ── Appearance Forge (AI 形象锻造炉) ────
    # 前端真值源：apps/web/src/types/appearance-forge.ts。
    # 服务端契约：ForgeResult / ForgeResultDto / ForgeController。

    ForgeMode:
      type: string
      description: 锻造模式
      enum: [template_photo, prompt_only, template_prompt, random]

    ForgeTemplate:
      type: object
      required: [id, name, image, tags, style]
      properties:
        id:    { type: string }
        name:  { type: string }
        image: { type: string, description: 模版预览图 URL }
        tags:  { type: array, items: { type: string } }
        style: { type: string, description: 风格标识 cyberpunk/gothic/holo/... }

    ForgeLabeledOption:
      type: object
      required: [id, label]
      properties:
        id:    { type: string }
        label: { type: string }
        color: { type: string, nullable: true, description: 仅瞳色等颜色选项使用 }

    ForgeFaceSlider:
      type: object
      required: [id, label]
      properties:
        id:    { type: string, description: 滑块键名；值域 0-100 }
        label: { type: string }

    ForgeColorScheme:
      type: object
      required: [id, name, colors]
      properties:
        id:   { type: string }
        name: { type: string }
        colors:
          type: array
          minItems: 2
          maxItems: 2
          items: { type: string, description: 十六进制颜色 }

    ForgeOptions:
      type: object
      required: [templates, hairStyles, eyeColors, styleTags, faceSliders, colorSchemes, promptSuggestions]
      properties:
        templates:         { type: array, items: { $ref: '#/components/schemas/ForgeTemplate' } }
        hairStyles:        { type: array, items: { $ref: '#/components/schemas/ForgeLabeledOption' } }
        eyeColors:         { type: array, items: { $ref: '#/components/schemas/ForgeLabeledOption' } }
        styleTags:         { type: array, items: { $ref: '#/components/schemas/ForgeLabeledOption' } }
        faceSliders:       { type: array, items: { $ref: '#/components/schemas/ForgeFaceSlider' } }
        colorSchemes:      { type: array, items: { $ref: '#/components/schemas/ForgeColorScheme' } }
        promptSuggestions: { type: array, items: { type: string } }

    ForgeRequest:
      type: object
      required: [artistId, mode, fusionRatio, prompt, styleTagIds, faceValues, lockedFeatures]
      properties:
        artistId:       { type: string }
        mode:           { $ref: '#/components/schemas/ForgeMode' }
        templateId:     { type: string, nullable: true }
        uploadedPhoto:  { type: string, nullable: true, description: template_photo 模式下的用户照片 DataURL }
        fusionRatio:    { type: integer, minimum: 0, maximum: 100 }
        prompt:         { type: string }
        hairId:         { type: string, nullable: true }
        eyeId:          { type: string, nullable: true }
        styleTagIds:    { type: array, items: { type: string } }
        faceValues:
          type: object
          additionalProperties: { type: integer, minimum: 0, maximum: 100 }
        lockedFeatures: { type: array, items: { type: string } }
        colorSchemeId:  { type: string, nullable: true }

    ForgeAppearanceStatus:
      type: string
      enum: [draft, official, listed, sold]
      description: 形象商业化状态。前端画廊用此区分草稿 / 官方 / 上架 / 售出。

    ForgeAppearanceMarketplace:
      type: object
      required: [price, listedAt, soldCount]
      properties:
        price:     { type: integer, description: 售价 credits 原始整数 }
        listedAt:  { type: string, format: date-time }
        soldCount: { type: integer }

    ForgeResult:
      type: object
      required: [id, image, prompt, mode, createdAt, locked]
      properties:
        id:         { type: string }
        artistId:   { type: string, description: 归属艺人 ID；history 接口按 query 过滤，响应中仍回传方便前端缓存 }
        image:      { type: string, description: 产出图像 URL }
        thumbnail:  { type: string, nullable: true }
        videoUrl:
          type: string
          nullable: true
          description: |
            保存后关联的短视频 URL；艺人画廊主视图优先用此字段渲染。
            /generate 产出的候选 videoUrl=null；调 /save 后由后端写入。
            当前 fake 实现：后端从 demo 池随机挑一个 URL（未接入 AI 视频生成）。
        prompt:     { type: string }
        mode:       { $ref: '#/components/schemas/ForgeMode' }
        createdAt:  { type: string, format: date-time }
        locked:     { type: array, items: { type: string } }
        status:     { $ref: '#/components/schemas/ForgeAppearanceStatus' }
        usageCount: { type: integer, nullable: true, description: 形象被用于 MV/场景/封面的次数 }
        marketplace:
          $ref: '#/components/schemas/ForgeAppearanceMarketplace'

    ForgeBlueprint:
      type: object
      required: [id, artistId, resultId, snapshot, createdAt]
      properties:
        id:        { type: string }
        artistId:  { type: string }
        resultId:  { type: string, description: 指向 ForgeResult.id 的弱引用 }
        snapshot:
          type: object
          additionalProperties: true
          description: 锁定字段 + 本次参数快照
        createdAt: { type: string, format: date-time }

    # ═══════════════════════════════════════════════════════════════════════
    # ▼ v2.x 扩展（2026-04 ~ 2026-05）—— 与 apps/web/src/types/* 对齐
    # 真值源：apps/web/src/types/<domain>.ts
    # 业务规则与公式：specs/BUSINESS_RULES.md
    # ═══════════════════════════════════════════════════════════════════════

    # ── Wallet & Ledger（v2 创作工坊起的积分核心；frontend src/types/wallet.ts）

    Wallet:
      type: object
      description: 钱包快照。total = license + recharge + gift（不含 pending）。
      required: [id, userId, totalBalance, licenseBalance, rechargeBalance,
                 giftBalance, pendingBalance, createdAt, updatedAt]
      properties:
        id:               { type: string }
        userId:           { type: string }
        totalBalance:     { type: integer }
        licenseBalance:   { type: integer, description: license 核销累计入账 }
        rechargeBalance:  { type: integer, description: 充值累计入账 }
        giftBalance:      { type: integer, description: 平台赠送 / 活动奖励 }
        pendingBalance:   { type: integer, description: 结算中（不计入 total）}
        createdAt:        { type: string, format: date-time }
        updatedAt:        { type: string, format: date-time }

    LedgerEntryType:
      type: string
      description: |
        不可变流水分类。所有钱包余额变更必须走 ledger，禁止直接 UPDATE 余额列。
        v0.33+: 完整覆盖 server LedgerEntry.LedgerEntryType 10 种类型；
        freeze/unfreeze 是 hold/release 生命周期事件，spend 是 commitHold 真扣。
      enum: [license_grant, recharge, refund, income, gift, spend, withdraw, freeze, unfreeze, adjust]

    LedgerEntry:
      type: object
      description: 不可变流水条目。新增即追加、不可改、不可删。
      required: [id, walletId, userId, type, amount, balanceAfter, description, createdAt]
      properties:
        id:            { type: string }
        walletId:      { type: string }
        userId:        { type: string }
        type:          { $ref: '#/components/schemas/LedgerEntryType' }
        amount:        { type: integer, description: 正数=入账，负数=出账 }
        balanceAfter:  { type: integer, description: 入账后总余额（冗余便于审计） }
        description:   { type: string }
        referenceId:   { type: string, nullable: true, description: 关联业务实体 id }
        referenceType: { type: string, nullable: true, description: '"song_revenue" / "nft_sale" / "license_key" 等' }
        createdAt:     { type: string, format: date-time }

    # ── v0.4：充值套餐 / 充值请求/响应（小程序"我的"页 + 充值页消费） ──
    RechargePackage:
      type: object
      required: [id, credits, priceCents, tag, recommended]
      properties:
        id:            { type: string, example: pkg-1000 }
        credits:       { type: integer, description: 套餐总积分（充进 rechargeBalance） }
        priceCents:    { type: integer, description: 价格（人民币分） }
        tag:           { type: string, description: '体验包 / 标准包 / 热门包 / 企业包' }
        recommended:   { type: boolean }
        bonusCredits:  { type: integer, nullable: true, description: 赠送积分（充进 giftBalance） }
        sortOrder:     { type: integer, nullable: true }

    RechargeRequest:
      type: object
      required: [packageId]
      properties:
        packageId: { type: string }

    RechargeResponse:
      type: object
      required: [wallet, ledgerEntry]
      properties:
        wallet:       { $ref: '#/components/schemas/Wallet' }
        ledgerEntry:  { $ref: '#/components/schemas/LedgerEntry' }

    # ── v0.4：AI Bot 同事会话（小程序 chat 页消费） ──
    BotMeta:
      type: object
      required: [id, name, subtitle, avatarColor, avatarIcon, iconColor]
      properties:
        id:           { type: string, example: pian }
        name:         { type: string, example: 片片 }
        subtitle:     { type: string, example: '创作官 · 在线' }
        avatarColor:  { type: string, example: '#0A0A0A' }
        avatarIcon:   { type: string, example: '✦' }
        iconColor:    { type: string, example: '#C8FF00' }

    ChatMessageType:
      type: string
      enum: [time, text, card-cta, card-form, card-grid, user-text]

    ChatHighlight:
      type: object
      required: [icon, title, sub]
      properties:
        icon:  { type: string }
        title: { type: string }
        sub:   { type: string }

    ChatFormField:
      type: object
      required: [label, value]
      properties:
        label: { type: string }
        value: { type: string }

    ChatTag:
      type: object
      required: [text, tone]
      properties:
        text: { type: string }
        tone: { type: string, enum: [warn, info, success, danger, default] }

    ChatGridItem:
      type: object
      required: [icon, label, sub]
      properties:
        icon:  { type: string }
        label: { type: string }
        sub:   { type: string }

    ChatCta:
      type: object
      required: [text]
      properties:
        text:  { type: string }
        route: { type: string, nullable: true }

    ChatMessage:
      type: object
      description: |
        Discriminated union by `type`. 服务端用 NON_NULL 序列化，前端按 type 解构使用对应字段。
        使用规范：
          - time/text/user-text: { type, text }
          - card-cta:   { type, title, body, [accent], [highlight], [cta] }
          - card-form:  { type, title, [tag], fields, [cta] }
          - card-grid:  { type, title, [sub], items, [cta] }
      required: [type]
      properties:
        type:      { $ref: '#/components/schemas/ChatMessageType' }
        text:      { type: string, nullable: true }
        accent:    { type: boolean, nullable: true }
        title:     { type: string, nullable: true }
        body:      { type: string, nullable: true }
        sub:       { type: string, nullable: true }
        highlight: { $ref: '#/components/schemas/ChatHighlight', nullable: true }
        tag:       { $ref: '#/components/schemas/ChatTag', nullable: true }
        fields:
          type: array
          nullable: true
          items: { $ref: '#/components/schemas/ChatFormField' }
        items:
          type: array
          nullable: true
          items: { $ref: '#/components/schemas/ChatGridItem' }
        cta:       { $ref: '#/components/schemas/ChatCta', nullable: true }

    BotConversation:
      type: object
      required: [bot, messages]
      properties:
        bot:      { $ref: '#/components/schemas/BotMeta' }
        messages:
