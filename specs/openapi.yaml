    get:    { tags: [mixcut], operationId: getMixcutAsset,    responses: { '200': { description: ok } } }
    delete: { tags: [mixcut], operationId: deleteMixcutAsset, responses: { '200': { description: ok } } }

  # v0.21+: 已生成视频（render output）软删
  # 用户在「我的视频库」点删除会调此端点；server 把 MixcutRenderOutput.deleted_at 置非空，
  # 列表 dto 立即过滤掉该 output；30 天后由 MixcutOutputCleanupScheduler 物理清理。
  /mixcut/outputs/{outputId}:
    parameters:
      - { in: path, name: outputId, required: true, schema: { type: string } }
    delete: { tags: [mixcut], operationId: deleteMixcutOutput, responses: { '200': { description: ok } } }

