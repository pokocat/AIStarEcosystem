      responses: { '200': { description: ok } }
    post:
      tags: [admin-celebrity]
      operationId: adminCreateCelebrityStarAuthorization
      responses: { '201': { description: created } }
  /admin/celebrity/star-authorizations/{id}:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    get:    { tags: [admin-celebrity], operationId: adminGetCelebrityStarAuthorization,    responses: { '200': { description: ok } } }
    put:    { tags: [admin-celebrity], operationId: adminUpdateCelebrityStarAuthorization, responses: { '200': { description: ok } } }
    delete: { tags: [admin-celebrity], operationId: adminDeleteCelebrityStarAuthorization, responses: { '204': { description: ok } } }
