    Concert:
      type: object
      description: 线上直播（v2.2 简化，仅 streamUrl）。
      required: [id, title, status, artistIds]
      properties:
        id:         { type: string }
        title:      { type: string }
        status:     { $ref: '#/components/schemas/ConcertStatus' }
        artistIds:  { type: array, items: { type: string } }
