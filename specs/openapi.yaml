  # ── AI 模型接入端点 + 网关 Key + AI 应用绑定（v0.5 §D8 起；v0.41 统一 endpoint+key+binding） ──
  # 端点 = 固定 {上游密钥 + 单模型 + 地址}，自带网关 Key（sk-aep-*）；路由保留 /admin/ai-models。
  /admin/ai-models:
    get:  { tags: [admin-ai-models], operationId: adminListAiModelEndpoints,  responses: { '200': { description: ok } } }
    post: { tags: [admin-ai-models], operationId: adminCreateAiModelEndpoint, responses: { '201': { description: created } } }
  /admin/ai-models/presets:
    get: { tags: [admin-ai-models], operationId: adminListAiModelPresets, responses: { '200': { description: 内置常见服务商预设（火山方舟 / Kimi / DeepSeek / 千问 / OpenAI） } } }
  /admin/ai-models/usage:
    get:
      tags: [admin-ai-models]
      operationId: adminAiModelUsage
      parameters: [{ name: days, in: query, required: false, schema: { type: integer, default: 30, maximum: 365 } }]
      responses: { '200': { description: 全局大模型用量报表（自建 token 流水聚合；按服务商 + 模型维度） } }
  /admin/ai-models/discover-models:
    post: { tags: [admin-ai-models], operationId: adminDiscoverAiModels, responses: { '200': { description: 用 baseUrl+apiKey 调服务商 GET /models 拉取可用模型 } } }
  /admin/ai-models/{id}:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    get:    { tags: [admin-ai-models], operationId: adminGetAiModelProvider,    responses: { '200': { description: ok } } }
    put:    { tags: [admin-ai-models], operationId: adminUpdateAiModelProvider, responses: { '200': { description: ok } } }
    delete: { tags: [admin-ai-models], operationId: adminDeleteAiModelProvider, responses: { '204': { description: ok } } }
  /admin/ai-models/{id}/test:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    post: { tags: [admin-ai-models], operationId: adminTestAiModelProvider, responses: { '200': { description: ok } } }
  /admin/ai-models/{id}/fetch-models:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    post: { tags: [admin-ai-models], operationId: adminFetchAiModels, responses: { '200': { description: 用已存 apiKey 重新拉取可用模型（拉回后保存写入配置） } } }
  /admin/ai-models/{id}/usage:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    get:
      tags: [admin-ai-models]
      operationId: adminAiModelUsageForProvider
      parameters: [{ name: days, in: query, required: false, schema: { type: integer, default: 30, maximum: 365 } }]
      responses: { '200': { description: 单端点大模型用量报表 } }
  /admin/ai-models/{id}/mint-key:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    post: { tags: [admin-ai-models], operationId: adminMintEndpointKey, responses: { '200': { description: 'v0.41：给端点铸造/重铸网关 Key sk-aep-*，明文仅返回一次（DB 存 bcrypt）' } } }
  /admin/ai-models/{id}/revoke-key:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    post: { tags: [admin-ai-models], operationId: adminRevokeEndpointKey, responses: { '200': { description: 'v0.41：撤销端点的网关 Key（不删端点）' } } }

