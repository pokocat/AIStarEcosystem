    put:    { tags: [admin-celebrity], operationId: adminUpdateCelebrityStar, responses: { '200': { description: ok } } }
    delete: { tags: [admin-celebrity], operationId: adminDeleteCelebrityStar, responses: { '204': { description: ok } } }

  /admin/celebrity/stars/{id}/photos:
