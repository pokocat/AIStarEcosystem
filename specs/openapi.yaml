    CelebrityProductInput:
      type: object
      required: [name, sellingPoints]
      properties:
        name:          { type: string }
        link:          { type: string, nullable: true }
        images:
          type: array
          items: { type: string }
        sellingPoints: { type: string }

    CelebrityShowcase:
      type: object
      required: [id, caption, engine, plays]
      properties:
        id:       { type: string }
        caption:  { type: string }
        engine:   { $ref: '#/components/schemas/CelebrityEngine' }
        plays:    { type: string }
        approval: { type: string, nullable: true }
        thumb:    { type: string, nullable: true }
        videoUrl: { type: string, nullable: true }

    CelebrityGenerationRequest:
      type: object
      required: [starId, mode, product, engine, duration, projectId]
      properties:
        starId:     { type: string }
        mode:       { type: string, enum: [template, blindbox] }
        templateId: { type: string, nullable: true }
        product:    { $ref: '#/components/schemas/CelebrityProductInput' }
        engine:     { $ref: '#/components/schemas/CelebrityEngine' }
        duration:   { type: integer, enum: [15, 30, 60] }
        creativeTendency: { type: string, nullable: true }
        projectId:  { type: string }
        channels:
          type: array
          items: { type: string }
        # ── v0.4：模型选择 + 动态扣分（小程序生成器使用） ──
        engineName: { $ref: '#/components/schemas/CelebrityEngine', nullable: true }
        durationSec: { type: integer, enum: [15, 30, 60], nullable: true }
        creditCost:  { type: integer, nullable: true, description: '前端按 engine.creditPrice × 时长系数计算后透传' }
        language:    { type: string, nullable: true }
        keypoints:
          type: array
          nullable: true
          items: { type: string }

    CelebrityZoneOverview:
      type: object
      description: 数据中心大盘（celebrity-zone ?tab=data）。
      required: [hero, starLeaderboard, weeklyTrend, channelMix]
      properties:
        hero:
          type: object
          required: [totalPlays, totalConversions, activeStars]
          properties:
            totalPlays:       { type: string }
            totalConversions: { type: string }
            activeStars:      { type: integer }
        starLeaderboard:
          type: array
          items:
            type: object
            required: [starId, name, avatar, plays, gmv, videoCount]
            properties:
              starId:     { type: string }
              name:       { type: string }
              avatar:     { type: string }
              plays:      { type: string }
              gmv:        { type: string }
              videoCount: { type: integer }
        weeklyTrend:
          type: array
          items:
            type: object
            required: [date, plays, conversions]
            properties:
              date:        { type: string, format: date }
              plays:       { type: integer }
              conversions: { type: integer }
        channelMix:
          type: array
          items:
            type: object
            required: [channel, share]
            properties:
              channel: { type: string }
              share:   { type: number, description: '0~1' }

    # ── 商品库（v2.7；src/types/product.ts）

    ProductCategory:
      type: string
      enum: [美妆, 食品饮料, 数码 3C, 服饰, 日用百货, 母婴, 运动, 其他]

    ProductSource:
      type: string
      enum: [manual, auto-from-generation]

    Product:
      type: object
      required: [id, name, category, images, sellingPoints, usageCount,
                 source, createdAt, updatedAt]
      properties:
        id:             { type: string }
        name:           { type: string }
        category:       { $ref: '#/components/schemas/ProductCategory' }
        link:           { type: string, nullable: true }
        images:
          type: array
          items: { type: string }
        sellingPoints:  { type: string }
        usageCount:     { type: integer }
        source:         { $ref: '#/components/schemas/ProductSource' }
        # v0.26+: 售价（分）+ 佣金率（0-100 整数百分比）
        priceCents:     { type: integer, nullable: true }
        commissionRate: { type: integer, nullable: true, minimum: 0, maximum: 100 }
        createdAt:      { type: string, format: date }
        updatedAt:      { type: string, format: date }

    ProductInput:
      type: object
      required: [name, category]
      properties:
        name:          { type: string }
        category:      { $ref: '#/components/schemas/ProductCategory' }
        link:          { type: string, nullable: true }
        images:
          type: array
          items: { type: string }
        sellingPoints: { type: string, nullable: true }
        source:        { $ref: '#/components/schemas/ProductSource' }
        # v0.26+: 售价 + 佣金率
        priceCents:     { type: integer, nullable: true }
        commissionRate: { type: integer, nullable: true, minimum: 0, maximum: 100 }

    # v0.26+ 商品链接解析（抖音商城）—— server 端策略链返回
    ProductLinkInfo:
      type: object
      required: [imageUrls, source]
      properties:
        title:                 { type: string, nullable: true }
        imageUrls:
          type: array
          items: { type: string }
        minPriceCents:         { type: integer, nullable: true }
        maxPriceCents:         { type: integer, nullable: true }
        sales:                 { type: integer, nullable: true }
        inferredSellingPoints: { type: string, nullable: true }
        source:                { type: string, description: "命中的 handler 名（douyin-query-embedded / douyin-html-scrape）" }

    ProductLinkParseRequest:
      type: object
      required: [url]
      properties:
        url:  { type: string, description: "抖音商城分享长链 或 PC 选品库短链" }

    # ── 异步任务壳（生成 / 分发 / 抽取等的统一返回）

    AsyncJobStarted:
      type: object
      required: [jobId, status]
      properties:
        jobId:             { type: string }
        status:            { type: string, enum: [queued, running, succeeded, failed, cancelled] }
        pollUrl:           { type: string, nullable: true }
        pollIntervalMs:    { type: integer, nullable: true }
        estimatedSeconds:  { type: integer, nullable: true }

    # ── 2.22 Social Distribution (sau 集成) ────
    # 短视频分发：用户绑定平台账号 (扫码) → 创建发布任务 → server 通过 sau-service
    # (Python+Playwright) 自动上传。storage_state (cookie) 在 server DB 加密存储，
    # 永不出口到前端 DTO。

    SocialPlatform:
      type: string
      enum: [douyin, kuaishou, xiaohongshu, shipinhao, bilibili, tiktok, youtube, baijiahao]
      description: |
        v1 仅启用前 4 个 (抖音 / 快手 / 小红书 / 视频号)；
        bilibili / tiktok / youtube / baijiahao 在 enum 占位但 service 抛 NOT_IMPLEMENTED。

    SocialAccountStatus:
      type: string
      enum: [active, expired, banned, pending]
      description: pending=绑定中尚未完成扫码；active=cookie 有效；expired=cookie 失效需重绑；banned=平台封禁

    SocialAccount:
      type: object
      required: [id, userId, platform, accountName, status, boundAt]
      properties:
        id:               { type: string }
        userId:           { type: string }
        platform:         { $ref: '#/components/schemas/SocialPlatform' }
        accountName:      { type: string, description: 用户自取的别名 }
        status:           { $ref: '#/components/schemas/SocialAccountStatus' }
        displayName:      { type: string, nullable: true }
        platformAccountId: { type: string, nullable: true, description: 平台侧账号号 / handle，例如抖音号 }
        avatarUrl:        { type: string, nullable: true }
        boundAt:          { type: string, format: date-time }
        lastVerifiedAt:   { type: string, format: date-time, nullable: true }
      description: |
        响应 DTO **不含 storage_state**；cookie 仅在 server DB 加密存储。

    SocialAccountBindInput:
      type: object
      required: [platform, accountName]
      properties:
        platform:    { $ref: '#/components/schemas/SocialPlatform' }
        accountName: { type: string }

    SocialAccountBindInit:
      type: object
      required: [sessionTicket, expiresAt]
      properties:
        sessionTicket:    { type: string, description: 用于 /bind-poll 的 ticket }
        qrImageDataUrl:   { type: string, nullable: true, description: "data:image/png;base64,..." }
        qrUrl:            { type: string, nullable: true, description: 部分平台是 deeplink 而非图片 }
        alreadyLoggedIn:  { type: boolean, description: sau-service 发现已有登录态，无需展示 QR }
        expiresAt:        { type: string, format: date-time }

    SocialAccountBindPollResult:
      type: object
      required: [status]
      properties:
        status:  { type: string, enum: [pending, awaiting_user, success, expired, failed] }
        account: { $ref: '#/components/schemas/SocialAccount' }
        interactionRequired:
          allOf:
            - $ref: '#/components/schemas/InteractionRequired'
          nullable: true
          description: status=awaiting_user 时存在；账号绑定阶段的短信验证码等交互上下文
        errorCode:    { type: string, nullable: true }
        message:      { type: string, nullable: true }
        diagnosticId: { type: string, nullable: true }

    PublishJobStatus:
      type: string
      description: |
        发布任务状态机。主线 QUEUED → UPLOADING → TRANSCODING → PUBLISHING → LIVE。
        AWAITING_USER 是「暂停」状态：平台弹出人机交互（短信验证码等）时进入；
        用户提交响应后回到 UPLOADING / PUBLISHING；用户超时（默认 5 分钟未输入）则
        转 FAILED with errorCode=AWAIT_USER_TIMEOUT。
      enum: [queued, uploading, transcoding, publishing, live, awaiting_user, failed, cancelled]

    InteractionRequired:
      type: object
      required: [kind, prompt, createdAt]
      description: |
        平台弹出的需要用户输入才能继续的人机交互上下文。仅当 PublishJob.status=awaiting_user
        时存在；mirror packages/types/src/publish-job.ts InteractionRequired。
      properties:
        kind:
          type: string
          enum: [sms]
          description: 交互类型；MVP 仅 sms（短信验证码），后续可加 captcha / slider
        prompt:
          type: string
          description: 给用户看的提示文案（中文）
        phoneMasked:
          type: string
          nullable: true
          description: 已脱敏的手机号，例如 "138****5678"
        canResendAt:
          type: string
          format: date-time
          nullable: true
          description: 下次允许重发短信的时间戳；未到点前 UI 应灰掉「重新发送」按钮
        createdAt:
          type: string
          format: date-time
          description: 进入 awaiting_user 的时间；前端用来算等待时长 + 5 分钟超时倒计时

    PublishJob:
      type: object
      required: [id, projectId, platformId, platformName, status, progress, createdAt, updatedAt]
      properties:
        id:                { type: string }
        userId:            { type: string, nullable: true, description: sau 流程必填；drama legacy mock 可空 }
        projectId:         { type: string }
        socialAccountId:   { type: string, nullable: true }
        platformId:        { type: string }
        platformName:      { type: string }
        status:            { $ref: '#/components/schemas/PublishJobStatus' }
        progress:          { type: integer, minimum: 0, maximum: 100 }
        videoUrl:          { type: string, nullable: true, description: sau-service 拉取的源视频 URL }
        title:             { type: string, nullable: true }
        description:       { type: string, nullable: true }
        tags:              { type: array, items: { type: string }, nullable: true }
        coverUrl:          { type: string, nullable: true }
        externalTaskId:    { type: string, nullable: true, description: sau-service 远端任务 id (idempotent callback key) }
        externalUrl:       { type: string, nullable: true, description: 平台发布后的可访问 URL }
        errorCode:         { type: string, nullable: true }
        errorMessage:      { type: string, nullable: true }
        creditsSpent:      { type: integer, nullable: true, description: 任务扣的积分；失败不退 }
        interactionRequired:
          allOf:
            - $ref: '#/components/schemas/InteractionRequired'
          nullable: true
          description: status=awaiting_user 时存在；其他状态为 null
        createdAt:         { type: string, format: date-time }
        updatedAt:         { type: string, format: date-time }
        scheduledAt:       { type: string, format: date-time, nullable: true }

    CreatePublishJobInput:
      type: object
      required: [videoUrl, title, description, tags, targets]
      properties:
        projectId:
          type: string
          nullable: true
          description: |
            可选。缺省 / 空串 / 字面 "manual" 时服务端自动生成 "manual-batch-<userId>-<yyyyMMddHHmmss>"。
            混剪批量发布显式传 "mixcut-batch-<source>-<ts>"。两套前缀让任务追踪能区分 source 标签。
        videoUrl:     { type: string, description: sau-service 拉取的源视频 URL (公网可访问) }
        title:        { type: string }
        description:  { type: string }
        tags:         { type: array, items: { type: string } }
        coverUrl:     { type: string, nullable: true }
        targets:
          type: array
          minItems: 1
          items:
            type: object
            required: [platform, socialAccountId]
            properties:
              platform:         { $ref: '#/components/schemas/SocialPlatform' }
              socialAccountId:  { type: string }
              scheduledAt:      { type: string, format: date-time, nullable: true }

    PublishJobCallback:
      type: object
      required: [externalTaskId, status]
      properties:
        externalTaskId:  { type: string }
        status:          { $ref: '#/components/schemas/PublishJobStatus' }
        progress:        { type: integer, minimum: 0, maximum: 100, nullable: true }
        externalUrl:     { type: string, nullable: true }
        errorCode:       { type: string, nullable: true }
        errorMessage:    { type: string, nullable: true }
        interactionRequired:
          allOf:
            - $ref: '#/components/schemas/InteractionRequired'
          nullable: true
          description: |
            进入 awaiting_user 时由 sau-service 推；离开 awaiting_user 时显式置 null。
            其它 status 必须留空。
      description: |
        sau-service → server 的进度推送 payload (POST /internal/sau/job-callback)。
        以 externalTaskId 幂等；状态推进遵循 PublishJobStatus 状态机
        （AWAITING_USER 双向：可从 UPLOADING/TRANSCODING/PUBLISHING 进入，回到 UPLOADING/PUBLISHING/LIVE）。

    PublishJobEvent:
      type: object
      required: [id, jobId, kind, at]
      description: 发布任务不可变事件流（admin 审计视图）；mirror packages/types PublishJobEvent。
      properties:
        id:          { type: string }
        jobId:       { type: string }
        kind:        { type: string, description: "transition / progress / callback / error / system" }
        fromStatus:  { $ref: '#/components/schemas/PublishJobStatus', nullable: true }
        toStatus:    { $ref: '#/components/schemas/PublishJobStatus', nullable: true }
        progress:    { type: integer, minimum: 0, maximum: 100, nullable: true }
        note:        { type: string, nullable: true }
        at:          { type: string, format: date-time }

    # ── v0.20: 调度策略 sealed union（mixcut publish + v0.22 任务追踪 reschedule 共享） ──
    # 注意 wire key 是 snake_case（@JsonProperty 显式映射），与一般 camelCase 字段约定的例外。
    # 后端真值见 apps/server/.../dto/MixcutPublishBatchRequest.java#ScheduleSpec
    ScheduleSpec:
      oneOf:
        - $ref: '#/components/schemas/ScheduleSpecImmediate'
        - $ref: '#/components/schemas/ScheduleSpecSingle'
        - $ref: '#/components/schemas/ScheduleSpecDailyRecurring'
      discriminator:
        propertyName: strategy
        mapping:
          immediate: '#/components/schemas/ScheduleSpecImmediate'
          single: '#/components/schemas/ScheduleSpecSingle'
          daily_recurring: '#/components/schemas/ScheduleSpecDailyRecurring'

    ScheduleSpecImmediate:
      type: object
      required: [strategy]
      properties:
        strategy: { type: string, enum: [immediate] }

    ScheduleSpecSingle:
      type: object
      required: [strategy, at]
      properties:
        strategy: { type: string, enum: [single] }
        at:       { type: string, format: date-time, description: ISO 8601 UTC 时刻 }

    ScheduleSpecDailyRecurring:
      type: object
      required: [strategy, start_date, time_slots, timezone]
      properties:
        strategy:        { type: string, enum: [daily_recurring] }
        start_date:      { type: string, description: '"YYYY-MM-DD" 在 timezone 下的日历日' }
        time_slots:
          type: array
          minItems: 1
          items: { type: string, pattern: '^([01]\d|2[0-3]):[0-5]\d$' }
          description: ["09:00","12:00","18:00"]，HH:MM 24h；后端会排序去重
        timezone:        { type: string, description: 'IANA, 例 "Asia/Shanghai"' }
        max_days:        { type: integer, nullable: true, description: 'null = 直到 outputs 用完；非 null 时要 N <= max_days * time_slots.length' }
        jitter_minutes:  { type: integer, nullable: true, minimum: 0, maximum: 30, description: '[0, 30]；null/0 = 无抖动' }

    # ── v0.22: 任务追踪 ──
    PublishBatchSource:
      type: string
      enum: [mixcut, manual, other]
      description: 据 projectId 前缀派生的来源标签（mixcut-batch- / manual-batch- / 其他）

    PublishBatchSummary:
      type: object
      required: [projectId, source, displayTitle, totalJobs, statusCounts, progressPct, firstCreatedAt, lastCreatedAt, platforms, hasInflight]
      description: |
        某 projectId 下所有 PublishJob 的聚合卡片。mirror packages/types PublishBatchSummary。
        服务端按 GROUP BY project_id 拉，Java 层 fold 后返回；不在 DB 落实体表。
      properties:
        projectId:    { type: string }
        source:       { $ref: '#/components/schemas/PublishBatchSource' }
        displayTitle: { type: string, description: "<title> ×N；title 取批次内首条 non-blank" }
        totalJobs:    { type: integer, minimum: 0 }
        statusCounts:
          type: object
          additionalProperties: { type: integer, minimum: 0 }
          description: 8 个 wire key（queued/uploading/transcoding/publishing/awaiting_user/live/failed/cancelled）→ count；0 也保留
        progressPct:        { type: integer, minimum: 0, maximum: 100, description: (live + failed + cancelled) / total * 100，floor }
        firstCreatedAt:     { type: string, format: date-time }
        lastCreatedAt:      { type: string, format: date-time }
        firstScheduledAt:   { type: string, format: date-time, nullable: true }
        lastScheduledAt:    { type: string, format: date-time, nullable: true }
        platforms:
          type: array
          items: { type: string }
          description: distinct platform wire 名（按首次出现顺序）
        hasInflight: { type: boolean, description: queued/uploading/transcoding/publishing/awaiting_user 任一非零 }

    RescheduleBatchInput:
      type: object
      required: [schedule]
      properties:
        schedule: { $ref: '#/components/schemas/ScheduleSpec' }
      description: |
        POST /me/publish-jobs/batches/{projectId}/reschedule 请求体。
        仅对 status=queued 的子集生效；其他状态原样保留。

    ErrorLog:
      type: object
      description: |
        v0.30：错误日志记录。所有被 GlobalExceptionHandler 兜底的异常（业务 + 系统）入库。
        仅 SUPER_ADMIN 可访问 /admin/error-logs；OPERATOR 调用返回 403。
      required: [id, logId, occurredAt]
      properties:
        id:            { type: string, description: 'UUID 内部主键' }
        logId:         { type: string, description: '短追查号（12 字符），用户报错时复述' }
        traceId:       { type: string, nullable: true, description: 'v0.30+：请求级 trace ID（X-Trace-Id），跨进程串联日志用（server / sau-service / @Async worker 共享）' }
        occurredAt:    { type: string, format: date-time }
        hostname:      { type: string, nullable: true, description: '发生异常的机器（容器/Pod hostname）' }
        userId:        { type: string, nullable: true }
        username:      { type: string, nullable: true }
        httpMethod:    { type: string, nullable: true }
        endpoint:      { type: string, nullable: true, description: '请求 path（不含 host/query）' }
        httpStatus:    { type: integer, nullable: true }
        errorType:     { type: string, nullable: true, description: '异常类简名' }
        errorCode:     { type: string, nullable: true, description: '业务码（BusinessException 才有）' }
        message:       { type: string, nullable: true }
        stacktrace:    { type: string, nullable: true, description: '已截到 8KB 内的完整堆栈' }
        requestParams: { type: string, nullable: true, description: '脱敏后的请求参数 JSON 文本' }
        userAgent:     { type: string, nullable: true }
        clientIp:      { type: string, nullable: true }

# ─────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────
paths:

  # ── 3.1 Auth ────────────────────────────

  /auth/register:
    post:
      tags: [auth]
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, email, password]
              properties:
                username: { type: string, minLength: 3, maxLength: 50 }
                email:    { type: string, format: email }
                password: { type: string, minLength: 8 }
      responses:
        '201':
          description: 注册成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/User' }
        '400':
          description: 字段校验失败
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /auth/login:
    post:
      tags: [auth]
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:    { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:         { $ref: '#/components/schemas/User' }
                          accessToken:  { type: string }
                          refreshToken: { type: string }
        '401':
          description: 邮箱或密码错误
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /auth/logout:
    post:
      tags: [auth]
      operationId: logout
      responses:
        '200':
          description: 登出成功

  /auth/refresh:
    post:
      tags: [auth]
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          description: Token刷新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          accessToken: { type: string }

  /auth/me:
    get:
      tags: [auth]
      operationId: getMe
      responses:
        '200':
          description: 当前用户信息
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/User' }
    patch:
      tags: [auth]
      operationId: updateMe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                langPreference:  { type: string, enum: [zh, en] }
                themePreference: { type: string }
                avatarUrl:       { type: string, format: uri }
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/User' }

  # ── 3.2 Singers ─────────────────────────

  /singers:
    get:
      tags: [singers]
      operationId: listSingers
      parameters:
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/SingerStatus' }
        - name: q
          in: query
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        '200':
          description: 歌手列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/SingerSummary' }
                      pagination: { $ref: '#/components/schemas/PaginationMeta' }
    post:
      tags: [singers]
      operationId: createSinger
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateSingerRequest' }
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SingerDetail' }
        '402':
          description: 积分不足
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: 套餐歌手数量上限
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /singers/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [singers]
      operationId: getSinger
      responses:
        '200':
          description: 歌手详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SingerDetail' }
        '404':
          description: 歌手不存在
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
    patch:
      tags: [singers]
      operationId: updateSinger
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:       { type: string }
                style:      { type: string }
                tags:       { type: array, items: { type: string } }
                status:     { $ref: '#/components/schemas/SingerStatus' }
                isPublic:   { type: boolean }
                parameters: { $ref: '#/components/schemas/PersonaParams' }
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SingerDetail' }
    delete:
      tags: [singers]
      operationId: deleteSinger
      description: 软删除（归档）
      responses:
        '200':
          description: 归档成功

  /singers/{id}/wardrobe:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [singers]
      operationId: updateSingerWardrobe
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EquippedItems' }
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/EquippedItems' }

  /singers/{id}/pose:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [singers]
      operationId: updateSingerPose
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                poseId:              { type: string, nullable: true }
                expressionId:        { type: string, nullable: true }
                expressionIntensity: { type: integer, minimum: 0, maximum: 100 }
                gestureId:           { type: string, nullable: true }
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SingerPoseConfig' }

  /singers/generate:
    post:
      tags: [singers]
      operationId: generateSinger
      description: AI生成歌手
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [parameters]
              properties:
                parameters:   { $ref: '#/components/schemas/PersonaParams' }
                prompt:       { type: string }
                referenceImageUrl: { type: string, format: uri }
      responses:
        '201':
          description: 生成成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SingerDetail' }

  # ── 3.3 Official IPs ─────────────────────

  /official-ips:
    get:
      tags: [officialIps]
      operationId: listOfficialIps
      responses:
        '200':
          description: 官方IP列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/OfficialIp' }

  /official-ips/{id}:
    get:
      tags: [officialIps]
      operationId: getOfficialIp
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: 官方IP详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/OfficialIp' }

  # ── 3.4 Wardrobe ─────────────────────────

  /wardrobe/items:
    get:
      tags: [wardrobe]
      operationId: listWardrobeItems
      parameters:
        - name: category
          in: query
          schema: { $ref: '#/components/schemas/ClothingCategory' }
        - name: rarity
          in: query
          schema: { $ref: '#/components/schemas/SingerQuality' }
        - name: q
          in: query
          schema: { type: string }
      responses:
        '200':
          description: 服装库列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/ClothingItem' }

  /wardrobe/my-items:
    get:
      tags: [wardrobe]
      operationId: listMyWardrobeItems
      responses:
        '200':
          description: 用户已拥有/收藏服装
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/UserWardrobeItem' }

  /wardrobe/items/{id}/favorite:
    post:
      tags: [wardrobe]
      operationId: toggleFavoriteWardrobeItem
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 收藏/取消收藏成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          isFavorited: { type: boolean }

  /wardrobe/items/{id}/unlock:
    post:
      tags: [wardrobe]
      operationId: unlockWardrobeItem
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 解锁成功
        '402':
          description: 积分不足
          content:
            application/json:
