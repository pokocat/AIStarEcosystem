      type: object
      description: 单条视频生成的引擎计价（getEnginePricing 接口返回）。
      required: [creditPrice, quotaCost]
      properties:
        creditPrice: { type: integer, description: 单条视频积分单价 }
        quotaCost:   { type: integer, description: 占套餐额度的「条数」 }

    # ── v0.35：动作级权益扣减 ──
    ActionPricing:
      type: object
      description: 单个 action 的单价配置（celebrity.action-pricing PlatformConfig）。
      properties:
        creditPrice:      { type: integer, nullable: true, description: 单价积分（null 时回退默认） }
        useEnginePricing: { type: boolean, nullable: true, description: true 时回退到 engine-pricing 表（仅 celebrity.video 适用） }

    # ── v0.36：销售渠道 / 售卖主体 ──
    SellingChannelType:
      type: string
      enum: [direct, agent, online_store, event, partner]
    SellingChannelStatus:
      type: string
      enum: [active, inactive]
    SellingChannel:
      type: object
      required: [id, code, name, type, status, createdAt, updatedAt]
      properties:
        id:            { type: string }
