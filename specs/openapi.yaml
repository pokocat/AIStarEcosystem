                    properties:
                      data: { $ref: '#/components/schemas/AsyncJobStarted' }
        '402':
          description: 积分不足
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /tracks/generate/{jobId}:
    get:
      tags: [tracks]
      operationId: getTrackGenerationStatus
      parameters:
        - name: jobId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: 任务状态
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/TrackGenerationResponse' }

  /tracks/{id}:
    parameters:
