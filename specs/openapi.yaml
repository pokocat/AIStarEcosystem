        '201':
          description: 合集配置已创建
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/NFTCollection' }

  /nft/collections/{id}:
    get:
      tags: [nft]
      operationId: getNftCollection
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: 合集详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/NFTCollection' }

  /nft/mint:
    post:
      tags: [nft]
      operationId: mintNft
      requestBody:
        required: true
