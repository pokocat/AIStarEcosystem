    get: { tags: [mixcut], operationId: listMixcutTemplates, responses: { '200': { description: ok } } }

  /mixcut/templates/{templateId}:
    parameters:
      - { in: path, name: templateId, required: true, schema: { type: string } }
    get:    { tags: [mixcut], operationId: getMixcutTemplate,    responses: { '200': { description: ok } } }
    put:    { tags: [mixcut], operationId: upsertMixcutTemplate, responses: { '200': { description: ok } } }
    delete: { tags: [mixcut], operationId: deleteMixcutTemplate, responses: { '200': { description: ok } } }

  # v0.48+: 实例 / 草稿（模版 → 实例 → 生成任务 中间层）。
  # 用户保存填了一半的配置为实例，可继续编辑 / 反复生成；生成的任务带 draft_id 指回实例。
