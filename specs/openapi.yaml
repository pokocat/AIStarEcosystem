  # ── 3.9 Marketplace ──────────────────────

  /marketplace:
    get:
      tags: [marketplace]
      operationId: listMarketplace
      security: []
      parameters:
        - name: style
          in: query
          schema: { type: string }
        - name: sort
          in: query
          schema:
            type: string
            enum: [priceAsc, priceDesc, newest, popular]
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: 市场艺人列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/MarketplaceArtist' }
                      pagination: { $ref: '#/components/schemas/PaginationMeta' }
    post:
      tags: [marketplace]
      operationId: listArtist
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ArtistListingRequest' }
      responses:
        '201':
          description: 挂牌成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/MarketplaceArtist' }
        '409':
          description: 艺人已在市场挂牌
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /marketplace/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [marketplace]
      operationId: getMarketplaceListing
      responses:
        '200':
          description: 艺人挂牌详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/MarketplaceArtist' }
    patch:
      tags: [marketplace]
      operationId: updateListing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                signingPrice:    { type: integer }
                description:     { type: string }
                enableAutoReply: { type: boolean }
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/MarketplaceArtist' }
    delete:
      tags: [marketplace]
      operationId: removeListing
      description: 下架艺人
      responses:
        '200':
          description: 下架成功

  /marketplace/{id}/sign:
    post:
      tags: [marketplace]
      operationId: signArtist
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agreedToTerms]
              properties:
                agreedToTerms: { type: boolean }
      responses:
        '200':
          description: 签约成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SigningContract' }
        '409':
          description: 艺人已被签约
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

