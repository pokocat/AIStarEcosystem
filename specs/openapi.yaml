  # 调用方跳转 /mixcut/create/{templateId}?draft_id={id} 让用户可编辑后再生成。
  # 404 MIXCUT_JOB_NOT_FOUND → job 不存在或不属于当前用户。
  /mixcut/jobs/{jobId}/create-draft:
    parameters:
      - { in: path, name: jobId, required: true, schema: { type: string } }
    post: { tags: [mixcut], operationId: createDraftFromJob, responses: { '200': { description: ok } } }

