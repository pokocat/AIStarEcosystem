                    properties:
                      data: { $ref: '#/components/schemas/DistributionJob' }
        '422':
          description: 发行前置条件未满足（如账号未绑定）
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /distribution/jobs/{id}:
    get:
      tags: [distribution]
      operationId: getDistributionJob
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
