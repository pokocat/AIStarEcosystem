        status:        { $ref: '#/components/schemas/SellingChannelStatus' }
        createdAt:     { type: string, format: date-time }
        updatedAt:     { type: string, format: date-time }

    # ── v0.53（审计 #9）：秘钥批次（与 server LicenseBatchDto / packages/types/license.ts 对齐） ──
    LicenseBatchStatus:
      type: string
      enum: [active, exhausted, revoked, expired]
    LicenseBatch:
      type: object
      required: [id, batchNo, name, initialCreditGrant, totalCount, activatedCount, status]
      properties:
        id:                 { type: string }
        batchNo:            { type: string }
        name:               { type: string, description: 营销名称，如「种子用户包」 }
        issuerTenantId:     { type: string, nullable: true, description: 'v0.36 前老批次的 Tenant 关联；新批次走 sellingChannelId' }
        sellingChannelId:   { type: string, nullable: true }
        tier:
          type: string
          nullable: true
          enum: [trial, basic, standard, premium, annual_pro, city_agent]
          description: 'v0.53 起白名单校验；admin UI 当前仅暴露 basic/premium'
        platforms:
          type: array
          description: 'v0.53：本批次可激活的子产品；空数组 = 全站可用'
          items: { type: string, enum: [music, drama, celebrity, aiavatar] }
        initialCreditGrant: { type: integer, format: int64, description: 每把秘钥核销时一次性入账的点数 }
        totalCount:         { type: integer, description: keys 表实时派生（v0.47 自愈） }
        activatedCount:     { type: integer, description: keys 表实时派生（v0.47 自愈） }
        validFrom:          { type: string, format: date-time, nullable: true }
        validTo:            { type: string, format: date-time, nullable: true }
        status:             { $ref: '#/components/schemas/LicenseBatchStatus' }
        createdAt:          { type: string, format: date-time }

