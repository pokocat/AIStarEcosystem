        - name: platform
          in: path
          required: true
          schema: { $ref: '#/components/schemas/PlatformAccountKey' }
      responses:
        '200':
          description: 解绑成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
