    post: { tags: [admin-selling-channels], operationId: adminCreateSellingChannel,  responses: { '201': { description: created } } }
  /admin/selling-channels/{id}:
    get:    { tags: [admin-selling-channels], operationId: adminGetSellingChannel,    responses: { '200': { description: ok } } }
    put:    { tags: [admin-selling-channels], operationId: adminUpdateSellingChannel, responses: { '200': { description: ok } } }
    delete: { tags: [admin-selling-channels], operationId: adminDeleteSellingChannel, responses: { '204': { description: deleted (soft) } } }

  # ── v0.37：平台运营登录（AepUser + operatorRole 体系，独立通道） ─────────────
  /admin/auth/login:
    post:
      tags: [admin-auth]
      operationId: adminLogin
      summary: admin_users 管理员账号密码登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string, description: 用户名或邮箱 }
                password: { type: string }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          token: { type: string }
                          user: { $ref: '#/components/schemas/AdminAuthUser' }
        '400': { description: 用户名或密码为空 }
        '401': { description: 用户名或密码错误 }
        '403': { description: 账号已停用 }
  /admin/auth/me:
    get:
      tags: [admin-auth]
      operationId: adminGetMe
      summary: 当前后台登录身份
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/AdminAuthUser' }
        '401': { description: unauthorized }
  /admin/auth/operator-login:
    post:
      tags: [admin-auth]
      operationId: adminOperatorLogin
      summary: AepUser.operatorRole 平台运营账号密码登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string, description: AepUser.username }
                password: { type: string }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          token: { type: string }
                          user: { $ref: '#/components/schemas/AdminAuthUser' }
        '400': { description: 用户名或密码为空 }
        '401': { description: 用户名或密码错误 }
        '403': { description: 无 operatorRole / 未设置密码 / 账号已停用 }
  /admin/auth/change-password:
    post:
      tags: [admin-auth]
      operationId: adminChangeOwnPassword
      summary: 当前后台登录账号修改自己的密码，兼容 admin 和 operator 两种账号来源
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword: { type: string }
                newPassword: { type: string, minLength: 6 }
      responses:
        '200': { description: ok }
        '400': { description: 当前密码或新密码为空 / 新密码太短 / 新旧密码相同 }
        '401': { description: unauthorized }
        '403': { description: 当前密码错误 }

  # ── v0.37：超级管理员给 AepUser 设置密码（让 operator 能登 admin） ─────────
  /admin/aep-users/{id}/set-password:
    post: { tags: [admin-aep-users], operationId: adminSetAepUserPassword, responses: { '200': { description: ok }, '403': { description: 'requires SUPER_ADMIN' } } }

  # ── 授权关系 CRUD + 状态机（v0.5 §D3 新增） ──────────────────────────
