<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AI IP — Three Design Directions</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin:0; padding:0; background:#f0eee9; }
  /* Reset for content inside artboards so they don't inherit canvas defaults */
  .ab * { box-sizing:border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="dir-tech.jsx"></script>
<script type="text/babel" src="dir-creator.jsx"></script>
<script type="text/babel" src="dir-premium.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { TechTokens, TechComponents, TechDashboard } = window;
const { CreatorTokens, CreatorComponents, CreatorDashboard } = window;
const { PremiumTokens, PremiumComponents, PremiumDashboard } = window;

function App() {
  return (
    <DesignCanvas>
      <DCSection id="intro" title="AI IP — Unified Design System" subtitle="Three style directions for the AI Digital Human SaaS platform — shared persona scaffolding, distinct surface treatments.">
        <DCArtboard id="brief" label="Brief" width={760} height={520}>
          <div className="ab" style={{padding:'48px 52px', height:'100%', background:'#fbfaf7', fontFamily:'Inter, system-ui, sans-serif', color:'#1a1814'}}>
            <div style={{fontSize:11, letterSpacing:2, textTransform:'uppercase', color:'#8a8275', marginBottom:18}}>Platform overview</div>
            <div style={{fontSize:30, fontWeight:600, lineHeight:1.15, letterSpacing:-0.6, marginBottom:18, textWrap:'balance'}}>
              One backbone, three audiences. Same persona DNA — separate go-to-market surfaces.
            </div>
            <div style={{fontSize:14, lineHeight:1.6, color:'#4a4439', marginBottom:28, maxWidth:580}}>
              The core platform manages an "AI IP persona" — voice, likeness, performance rights, monetization. Three sub-products layer business-specific modules on top. Each direction below proposes a complete visual language: tokens, components, and a representative dashboard.
            </div>
            <div style={{display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:16}}>
              {[
                {tag:'01 — Tech', name:'Tech-Professional', for:'MCN operators', dot:'#5b8def'},
                {tag:'02 — Creator', name:'Creator-Friendly', for:'Content teams', dot:'#7c5cff'},
                {tag:'03 — Premium', name:'Entertainment-Premium', for:'Celebrity & commerce', dot:'#d4af6a'},
              ].map((d,i)=>(
                <div key={i} style={{padding:'18px 18px 20px', border:'1px solid #e6e1d6', borderRadius:8, background:'#fff'}}>
                  <div style={{fontSize:10, letterSpacing:1.5, color:'#8a8275', textTransform:'uppercase', marginBottom:10}}>{d.tag}</div>
                  <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:6}}>
                    <span style={{width:8, height:8, borderRadius:'50%', background:d.dot}}></span>
                    <div style={{fontSize:15, fontWeight:600}}>{d.name}</div>
                  </div>
                  <div style={{fontSize:12.5, color:'#6a6356'}}>For {d.for}</div>
                </div>
              ))}
            </div>
            <div style={{marginTop:32, fontSize:12, color:'#8a8275', display:'flex', gap:24}}>
              <span>↔ Drag canvas to pan</span>
              <span>⌘+scroll to zoom</span>
              <span>Click any artboard to focus</span>
            </div>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="tech" title="01 — Tech-Professional" subtitle="Clean, neutral, enterprise-grade · dark-mode-first · MCN operators">
        <DCArtboard id="tech-tokens" label="Tokens" width={680} height={1280}><TechTokens /></DCArtboard>
        <DCArtboard id="tech-components" label="Components" width={1080} height={1280}><TechComponents /></DCArtboard>
        <DCArtboard id="tech-dashboard" label="Dashboard · AI Musician" width={1440} height={1280}><TechDashboard /></DCArtboard>
      </DCSection>

      <DCSection id="creator" title="02 — Creator-Friendly" subtitle="Modern, expressive, vibrant accents · generous whitespace · content teams">
        <DCArtboard id="creator-tokens" label="Tokens" width={680} height={1280}><CreatorTokens /></DCArtboard>
        <DCArtboard id="creator-components" label="Components" width={1080} height={1280}><CreatorComponents /></DCArtboard>
        <DCArtboard id="creator-dashboard" label="Dashboard · AI Short Drama" width={1440} height={1280}><CreatorDashboard /></DCArtboard>
      </DCSection>

      <DCSection id="premium" title="03 — Entertainment-Premium" subtitle="Bold, cinematic, rich imagery · glass + gradient accents · celebrity & commerce">
        <DCArtboard id="premium-tokens" label="Tokens" width={680} height={1280}><PremiumTokens /></DCArtboard>
        <DCArtboard id="premium-components" label="Components" width={1080} height={1280}><PremiumComponents /></DCArtboard>
        <DCArtboard id="premium-dashboard" label="Dashboard · Celebrity Commerce" width={1440} height={1280}><PremiumDashboard /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
