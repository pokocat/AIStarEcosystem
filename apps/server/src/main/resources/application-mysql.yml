# MySQL — 生产 / 联调环境
# 启动方式: --spring.profiles.active=mysql
# 建库: CREATE DATABASE aistareco CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
#       （参考 infra/rds/00_create_database.sql / infra/rds/01_create_app_user.sql）
spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/aistareco?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&connectionCollation=utf8mb4_unicode_ci&characterEncoding=UTF-8}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUMPOOLSIZE:20}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUMIDLE:5}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTIONTIMEOUT:30000}
      idle-timeout: ${SPRING_DATASOURCE_HIKARI_IDLETIMEOUT:600000}
      max-lifetime: ${SPRING_DATASOURCE_HIKARI_MAXLIFETIME:1800000}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

aep:
  # 生产默认关演示数据 seeder。新空库需要 admin 账号请按 infra/env/server.env.example
  # AEP_SEED_DEV_DATA_ENABLED 注释中的 SQL 手动插入第一个 SUPER_ADMIN。
  seed:
    dev-data:
      enabled: ${AEP_SEED_DEV_DATA_ENABLED:false}
  # MySQL profile 用于生产 / 联调。持久化资产默认走阿里云 OSS；
  # 本地 dev fallback 继续留在 application.yml 的 local fake-CDN。
  cdn:
    driver: ${AEP_CDN_DRIVER:oss}
    local-root: ${AEP_CDN_LOCAL_ROOT:./cdn-mock}
    public-base-url: ${AEP_CDN_PUBLIC_BASE_URL:https://aiartist.oss-cn-hangzhou.aliyuncs.com}
    oss:
      # ECS 与 bucket 同地域时走内网 endpoint；跨地域部署时用公网 endpoint 覆盖。
      endpoint: ${AEP_CDN_OSS_ENDPOINT:oss-cn-hangzhou-internal.aliyuncs.com}
      bucket: ${AEP_CDN_OSS_BUCKET:aiartist}
      access-key-id: ${AEP_CDN_OSS_ACCESS_KEY_ID:}
      access-key-secret: ${AEP_CDN_OSS_ACCESS_KEY_SECRET:}
      # 出 wire 的公网 base URL。若已绑定 CDN/CNAME，可用 env 覆盖为对应 HTTPS 域名。
      base-url: ${AEP_CDN_OSS_BASE_URL:https://aiartist.oss-cn-hangzhou.aliyuncs.com}
      key-prefix: ${AEP_CDN_OSS_KEY_PREFIX:media}
      region: ${AEP_CDN_OSS_REGION:cn-hangzhou}
    signed-url:
      # 默认用 OSS pre-signed URL，避免没有 CDN PrivateKey 时裸 URL 出网。
      # 高带宽生产建议通过 env 改为 cdn 并配置 AEP_CDN_SIGNED_URL_CDN_AUTH_KEY。
      strategy: ${AEP_CDN_SIGNED_URL_STRATEGY:oss}
      ttl-seconds: ${AEP_CDN_SIGNED_URL_TTL_SECONDS:3600}
      cdn-auth-key: ${AEP_CDN_SIGNED_URL_CDN_AUTH_KEY:}
  # MySQL profile 同时服务 dev 联调和生产；默认 log，避免本地 dev mysql 误访问阿里云短信。
  # 生产真发必须显式设置 AEP_SMS_DRIVER=aliyun。
  sms:
    driver: ${AEP_SMS_DRIVER:log}
    code:
      length: 6
      ttl-seconds: 300            # 验证码有效期 5 分钟
      rate-limit-seconds: 60      # 同一手机号 60s 内不能重发
      max-failures: 5             # 单手机号连错 5 次 → 锁定
      lock-seconds: 1800          # 锁定 30 分钟
      # v0.31+ dev 联调专用：设非空时所有手机号都收同一个码（如 123456），
      # 省去每次去 server log grep 真随机码的麻烦。
      # **严格双门禁**：必须 driver=log + dev-fixed 非空才生效；driver=aliyun
      # 时即使配了 dev-fixed 也会被忽略（防 prod 误启用）。
      dev-fixed: ${AEP_SMS_DEV_FIXED_CODE:}
