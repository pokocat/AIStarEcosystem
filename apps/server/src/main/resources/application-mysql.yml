# MySQL — 生产 / 联调环境
# 启动方式: --spring.profiles.active=mysql
# 建库: CREATE DATABASE aistareco CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/aistareco?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
