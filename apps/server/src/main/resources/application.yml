server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/aistareco?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
    open-in-view: false
  jackson:
    default-property-inclusion: non_null

logging:
  level:
    com.aistareco: INFO
    org.hibernate.SQL: WARN

aep:
  jwt:
    secret: aep-dev-secret-key-change-in-prod-32chars
    expiration-ms: 3600000
