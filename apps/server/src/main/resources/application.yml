server:
  port: 8080

spring:
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    open-in-view: false
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      enabled: true
      max-file-size: ${AEP_UPLOAD_MAX_FILE_SIZE:200MB}
      max-request-size: ${AEP_UPLOAD_MAX_REQUEST_SIZE:200MB}
      file-size-threshold: 4MB
  # v0.34+ Flyway 数据库版本控制（dev/prod 共享）。
  # 行为：
  #   - 首启看到 schema 已有表但无 flyway_schema_history → baseline-on-migrate=true 自动 baseline 到 V1
  #   - 之后每次启动按 V<N>__xxx.sql 排序应用未执行的
  # 与 Hibernate ddl-auto=update 共存策略：当前 update 仍负责首次建表 + 字段补全；
  # 真正 schema 改动应该走 V2+ 文件而非依赖 ddl-auto。
  flyway:
    enabled: ${AEP_FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: "baseline"
    locations: classpath:db/migration
    # 出错时不自动修复历史；保持人工介入
    out-of-order: false
    validate-on-migrate: true

logging:
  level:
    com.aistareco: INFO
    org.hibernate.SQL: WARN
  # v0.30+ trace 串联：MDC 里的 traceId 加进 console / file pattern。
  # `%X{traceId:-}` 表示当 MDC.traceId 为空时输出空串（不是字面 "-"）。TraceFilter 几乎总会设值，
  # 但 servlet 容器自身在 dispatch 前的几行启动日志 / shutdown 日志没 traceId，留空更整洁。
  # Spring Boot 默认 pattern 见 DefaultLogbackConfiguration；这里只覆盖 pattern.console / pattern.file
  # 把 [traceId] 字段插在日志级别和 logger 名之间，便于眼扫 + grep。
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%X{traceId:-}]){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}"
    file:    "%d{yyyy-MM-dd HH:mm:ss.SSS} ${LOG_LEVEL_PATTERN:-%5p} ${PID:- } --- [%X{traceId:-}] [%t] %-40.40logger{39} : %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}"

aep:
  # v0.34+ 演示数据 seeder 全局开关。
  # true  → DataInitializer / CelebrityZoneDataInitializer / CelebrityProductSeeder /
  #         DemoCatalogSeeder / DataSeeder / AiModelProviderDataInitializer /
  #         MixcutTemplateSeeder 全部运行（dev / 本地 H2 用）
  # false → 全部跳过（生产 / RDS 空库用，避免无声写入 admin/admin123 等演示账号）
  # 注意：MixcutPresetSeeder 不受此开关控制（它是平台基础数据，生产也需要）
  seed:
    dev-data:
      enabled: ${AEP_SEED_DEV_DATA_ENABLED:true}
  jwt:
    secret: ${AEP_JWT_SECRET:aep-dev-secret-key-change-in-prod-32chars}
    expiration-ms: ${AEP_JWT_EXPIRATION_MS:604800000}
  internal:
    # 内部服务（如 apps/llm-gateway）→ apps/server 调用的共享密钥
    # 生产环境 **必须** 用 env 注入；任何写到 git 的 default 都视同泄漏
    secret: ${AEP_INTERNAL_SECRET:aep-dev-internal-secret-change-in-prod}
  llm:
    # llm-gateway 上报 usage 时的 credit 计费率（每 100 tokens 扣 1 credit）
    # 简化模型；后续按 model 维度拆分
    credits-per-100-tokens: ${AEP_LLM_CREDITS_PER_100_TOKENS:1}
  dev-auth:
    enabled: ${AEP_DEV_AUTH_ENABLED:false}
  # v0.43+ 子产品平台访问隔离（music / drama / celebrity）。
  #   true  → 任意注册入口授予全部子产品（一处注册，三端可用）。开发 / 联调默认。
  #   false → 注册只授予来源子产品（前端登录页透传 platform）；其余子产品需另行开通。
  # 访问拦截在前端按 /api/me 返回的 platforms 判断；后端只负责注册时授予哪些平台。
  platform:
    dev-grant-all: ${AEP_PLATFORM_DEV_GRANT_ALL:true}
  # v0.43+ 本地 fake 大模型（OpenAI 兼容）。开启后 DevFakeAiSeeder 自动接入端点 + 绑定用途，
  # 让「真连后端大模型」链路在没有真实 key 时也能端到端跑通（配套 scripts/dev-fake-llm-server.mjs）。
  # 仅 dev 默认开启；prod 关闭，由运营在后台配真实端点。
  dev-fake-llm:
    enabled: ${AEP_DEV_FAKE_LLM_ENABLED:false}
    base-url: ${AEP_DEV_FAKE_LLM_BASE_URL:http://localhost:8091/v1}
    model: ${AEP_DEV_FAKE_LLM_MODEL:fake-model-v1}
  assets:
    video-base-url: ${AEP_FORGE_VIDEO_BASE:/static/videos}
  # v0.49+: 统一文件存储门面（FileStorageService）。底层 driver 仍走 aep.cdn.*。
  storage:
    local-dir: ${AEP_STORAGE_LOCAL_DIR:./file-storage}
    public-url-base: ${AEP_STORAGE_PUBLIC_URL_BASE:/static/files}
    signed-url-ttl-seconds: ${AEP_STORAGE_SIGNED_TTL:3600}
    # 上传 CDN 成功后是否保留本机副本（ffmpeg/file_url 兜底需要时为 true；纯 OSS-read 终态设 false）
    keep-local-copy: ${AEP_STORAGE_KEEP_LOCAL:true}
  mixcut:
    # 渲染产出目录（绝对或相对工作目录）；下面映射到 publicUrlBase
    output-dir: ${AEP_MIXCUT_OUTPUT_DIR:./mixcut-output}
    # 工作目录（下载素材的临时区）
    work-dir: ${AEP_MIXCUT_WORK_DIR:./mixcut-work}
    # ffmpeg / ffprobe 可执行文件名或绝对路径
    ffmpeg-bin: ${AEP_FFMPEG_BIN:ffmpeg}
    ffprobe-bin: ${AEP_FFPROBE_BIN:ffprobe}
    # 产出 URL 前缀（前端拉到的 file_url）
    public-url-base: ${AEP_MIXCUT_PUBLIC_URL_BASE:/static/mixcut}
    # 并发渲染数（@Async 线程池大小）
    max-concurrent: ${AEP_MIXCUT_MAX_CONCURRENT:2}
    # 单个变体最长时长（秒），超过截断
    max-output-duration-sec: ${AEP_MIXCUT_MAX_OUTPUT_DURATION_SEC:15}
    # 输出分辨率上限：模板 canvas 大于此值时按比例缩到 fit。
    # 1080p 软编 CPU 跑不动多 overlay 场景；默认 720p 让 macOS / Linux 容器都 ~1x realtime。
    # 想 1080p 输出请改 max-output-width=1080 + video-codec=h264_videotoolbox（macOS）。
    max-output-width: ${AEP_MIXCUT_MAX_OUTPUT_WIDTH:720}
    max-output-height: ${AEP_MIXCUT_MAX_OUTPUT_HEIGHT:1280}
    # 视频编码器。libx264 = CPU 软编（兼容）；macOS 可改 h264_videotoolbox 走 GPU。
    video-codec: ${AEP_MIXCUT_VIDEO_CODEC:libx264}
    # 每个素材最大下载体积（字节）
    max-asset-bytes: ${AEP_MIXCUT_MAX_ASSET_BYTES:104857600}
    # ffmpeg 单次执行超时（毫秒）。本机 CPU 编码 1080p 多变体场景 120s 不够，
    # 默认调到 5 分钟。生产 / GPU 编码可调小。
    ffmpeg-timeout-ms: ${AEP_MIXCUT_FFMPEG_TIMEOUT_MS:300000}
    # 用户上传素材目录（绝对或相对工作目录）
    asset-dir: ${AEP_MIXCUT_ASSET_DIR:./mixcut-assets}
    # 用户上传素材公开 URL 前缀
    asset-public-url-base: ${AEP_MIXCUT_ASSET_URL_BASE:/static/mixcut-assets}
  # v0.14+: CDN 抽象层。
  # 通用 / dev profile 默认 local fake-CDN；MySQL profile 在 application-mysql.yml
  # 覆盖为 OSS 默认，生产再由 /etc/aistareco/server.env 注入密钥和域名。
  cdn:
    driver: ${AEP_CDN_DRIVER:local}
    local-root: ${AEP_CDN_LOCAL_ROOT:./cdn-mock}
    # 相对路径走 same-origin；绝对 URL（http://cdn.example.com）由外部 OSS / CDN 域名直供
    public-base-url: ${AEP_CDN_PUBLIC_BASE_URL:/cdn}
  # v0.16+: 文字转图 —— 纯 Java2D 内部渲染，无外部进程依赖
  picgen:
    enabled: ${AEP_PICGEN_ENABLED:true}
    # 渲染产出（每变体一张）落盘目录，挂到 mixcut.output-dir/picgen
    output-dir: ${AEP_PICGEN_OUTPUT_DIR:./mixcut-output/picgen}
    # 预览图落盘目录（24h 后由 cleanup 任务清掉；MVP 不做）
    preview-dir: ${AEP_PICGEN_PREVIEW_DIR:./mixcut-output/picgen-preview}
    preview-public-url-base: ${AEP_PICGEN_PREVIEW_URL_BASE:/static/picgen-preview}
  # v0.41+: 素材运营带货视频生成（真实视频大模型 · 异步 submit + 轮询）。
  # token / baseUrl / model 在后台「AI 模型」页按 provider 配（用途勾「视频生成」），不在此配 token。
  # 这里只配「怎么提交 / 怎么轮询」协议细节 + 轮询节奏，换厂商时一般只改这些子路径即可。
  # 默认对齐异步任务约定（提交返回 task_id，轮询拿状态 + 成片 URL，如 智谱 CogVideoX）。
  material:
    video:
      submit-path: ${AEP_VIDEO_SUBMIT_PATH:/videos/generations}
      poll-path-template: ${AEP_VIDEO_POLL_PATH:/async-result/{id}}
      poll-interval-seconds: ${AEP_VIDEO_POLL_INTERVAL_SEC:8}
      max-wait-seconds: ${AEP_VIDEO_MAX_WAIT_SEC:600}
      max-concurrent: ${AEP_VIDEO_MAX_CONCURRENT:3}
      default-model: ${AEP_VIDEO_DEFAULT_MODEL:cogvideox-flash}
      default-duration-sec: ${AEP_VIDEO_DEFAULT_DURATION_SEC:5}
      default-aspect-ratio: ${AEP_VIDEO_DEFAULT_ASPECT:9:16}
      http-timeout-seconds: ${AEP_VIDEO_HTTP_TIMEOUT_SEC:30}
      # 成片持久化：模型返回 URL → server 下载 → CdnUploader 上传。
      # dev 默认落 local fake-CDN；生产 aep.cdn.driver=oss 时落 OSS。
      upload-to-cdn: ${AEP_VIDEO_UPLOAD_TO_CDN:true}
      download-timeout-seconds: ${AEP_VIDEO_DOWNLOAD_TIMEOUT_SEC:120}
      max-download-bytes: ${AEP_VIDEO_MAX_DOWNLOAD_BYTES:536870912}
  coze:
    enabled: ${AEP_COZE_ENABLED:true}
    token: ${AEP_COZE_TOKEN:}
    bot-id: ${AEP_COZE_BOT_ID:}
    api-base: ${AEP_COZE_API_BASE:https://api.coze.cn}
    user-id-prefix: ${AEP_COZE_USER_ID_PREFIX:aep-producer-}
    read-timeout-ms: ${AEP_COZE_READ_TIMEOUT_MS:120000}
  # 数字人资产平台（apps/web-aiavatar，v0.51 dap 领域：com.aistareco.aep.dap.*；表 dap_*；账户复用 aep_users + 钱包）。
  # 大模型接入点（chat / image / video）统一在后台「AI 模型与 Key + AI 应用绑定」配置
  # （purpose=DAP_PERSONA / DAP_IMAGE / DAP_VIDEO），DapMultimodalClient 运行时只读 admin 端点，无 env 兜底。
  # 未绑定端点时按 allow-placeholder 决定：dev 降级占位（avatar.mock=true，前端 MOCK 角标）/ 生产直接 503。
  dap:
    # 多模态 HTTP 调用 + 异步视频轮询参数（与具体厂商无关）
    http:
      timeout-seconds: ${AEP_DAP_HTTP_TIMEOUT_SECONDS:120}
    video:
      poll-interval-seconds: ${AEP_DAP_VIDEO_POLL_INTERVAL_SECONDS:8}
      max-wait-seconds: ${AEP_DAP_VIDEO_MAX_WAIT_SECONDS:900}
    # Dev 专用：开机自动把 DAP 三个用途绑定到一个本地/真实引擎（dap-dev.sh / dap-verify.sh 用），
    # 免去每次手动进 admin 配置。生产默认 enabled=false（DapDevEndpointSeeder 不跑）；即便开启也只是把端点 +
    # 绑定「种」进 admin 表（幂等、不覆盖已配），运行时仍只读 admin 端点。指向真实引擎时把 base-url/api-key/*-model 填真值。
    dev-seed:
      enabled: ${AEP_DAP_DEV_SEED_ENABLED:false}
      base-url: ${AEP_DAP_DEV_SEED_BASE_URL:http://localhost:18181}
      api-key: ${AEP_DAP_DEV_SEED_API_KEY:dev-fake-key}
      chat-model: ${AEP_DAP_DEV_SEED_CHAT_MODEL:fake-chat}
      image-model: ${AEP_DAP_DEV_SEED_IMAGE_MODEL:fake-image}
      video-model: ${AEP_DAP_DEV_SEED_VIDEO_MODEL:fake-video}
    # 异步生成任务并发上限（dapJobExecutor 线程池大小）
    max-concurrent: ${AEP_DAP_MAX_CONCURRENT:3}
    # 月度赠送算力（点）；首次访问账户 / 提交任务时按月幂等发放。0 = 不发放。
    monthly-grant: ${AEP_DAP_MONTHLY_GRANT:1500}
    # 回收站保留天数（软删超期后每日 03:50 物理清理行+文件）
    trash-retention-days: ${AEP_DAP_TRASH_RETENTION_DAYS:30}
    # 未配置生成引擎（admin「AI 应用绑定」未给 DAP_* 绑定端点）时是否允许占位产物降级：
    # dev 默认 true（无端点也能联调全链路）；mysql/生产 profile 默认 false →
    # 提交生成任务直接 503 DAP_ENGINE_NOT_CONFIGURED（不生成、不扣费）。
    allow-placeholder: ${AEP_DAP_ALLOW_PLACEHOLDER:true}
    # 各动作扣费（点，hold→commit/release 三段式）；0 = 免费
    pricing:
      generate: ${AEP_DAP_PRICE_GENERATE:20}
      generate-upload: ${AEP_DAP_PRICE_GENERATE_UPLOAD:15}
      iterate: ${AEP_DAP_PRICE_ITERATE:5}
      warp: ${AEP_DAP_PRICE_WARP:3}
      look: ${AEP_DAP_PRICE_LOOK:8}
      derive-atlas: ${AEP_DAP_PRICE_DERIVE_ATLAS:12}
      derive-expr: ${AEP_DAP_PRICE_DERIVE_EXPR:10}
      derive-scene: ${AEP_DAP_PRICE_DERIVE_SCENE:8}
      derive-ward: ${AEP_DAP_PRICE_DERIVE_WARD:8}
      derive-d3: ${AEP_DAP_PRICE_DERIVE_D3:10}
      derive-video: ${AEP_DAP_PRICE_DERIVE_VIDEO:30}
      voice-clone: ${AEP_DAP_PRICE_VOICE_CLONE:10}
  # v0.31+ 手机号 + SMS 验证码登录 / 注册（三个新 web app + 小程序入口）。
  # driver=log：默认；验证码打到 server log，dev / 联调 / 阿里云模板未备案前的占位
  # driver=aliyun：调阿里云 SMS SDK，需配齐签名 / 模板；凭据可显式配 AK 或走默认凭据链
  sms:
    driver: ${AEP_SMS_DRIVER:aliyun}
    code:
      length: 6
      ttl-seconds: 300            # 验证码有效期 5 分钟
      rate-limit-seconds: 60      # 同一手机号 60s 内不能重发
      max-failures: 5             # 单手机号连错 5 次 → 锁定
      lock-seconds: 1800          # 锁定 30 分钟
      # v0.31+ dev 联调专用：设非空时所有手机号都收同一个码（如 123456），
      # 省去每次去 server log grep 真随机码的麻烦。
      # **严格双门禁**：必须 driver=log + dev-fixed 非空才生效；driver=aliyun
      # 时即使配了 dev-fixed 也会被忽略（防 prod 误启用）。
      dev-fixed: ${AEP_SMS_DEV_FIXED_CODE:}
    aliyun:
      access-key-id: ${ALIYUN_SMS_ACCESS_KEY_ID:}
      access-key-secret: ${ALIYUN_SMS_ACCESS_KEY_SECRET:}
      sign-name: ${ALIYUN_SMS_SIGN_NAME:声量算法杭州科技}
      # 两个模板变量都固定只有 code；sender 始终发送 {"code":"123456"} 形态。
      login-template-code: SMS_507065062
      register-template-code: ${ALIYUN_SMS_REGISTER_TEMPLATE_CODE:${ALIYUN_SMS_TEMPLATE_CODE:SMS_506890177}}
      # legacy fallback，仅兼容旧部署自定义配置；新配置请用 login/register-template-code。
      template-code: ${ALIYUN_SMS_TEMPLATE_CODE:}
      region: ${ALIYUN_SMS_REGION:cn-hangzhou}
      endpoint: ${ALIYUN_SMS_ENDPOINT:dysmsapi.aliyuncs.com}
      connect-timeout-seconds: ${ALIYUN_SMS_CONNECT_TIMEOUT_SECONDS:10}
      response-timeout-seconds: ${ALIYUN_SMS_RESPONSE_TIMEOUT_SECONDS:20}
      call-timeout-seconds: ${ALIYUN_SMS_CALL_TIMEOUT_SECONDS:30}

# sau-service (Python + Playwright，独立 FastAPI 进程) 集成配置
# dev: docker-compose 启 apps/sau-service:8090; prod: k8s 同 namespace
# 共享密钥沿用 aep.internal.secret (X-Internal-Secret header)
sau:
  base-url: ${SAU_SERVICE_URL:http://localhost:8090}
  shared-secret: ${AEP_INTERNAL_SECRET:aep-dev-internal-secret-change-in-prod}
  # /login/start 在真模式下要 cold-start patchright + 拉远端登录页 + 切 tab + 抓 QR；
  # 首次启动综合 30-60s 是常态（chromium 进程冷启 + XHS SPA hydrate）。
  # 30s 偏紧，命中后 Spring 抛 SAU_HTTP_ERROR，用户看到「Invalid JSON / 502」错。
  request-timeout-ms: ${SAU_REQUEST_TIMEOUT_MS:90000}
  # sau-service callback 回 server 的 base URL (含 /api/internal/sau 路径)
  callback-base-url: ${SAU_CALLBACK_BASE_URL:http://localhost:8080/api/internal/sau}
  # 默认上传扣费，单位：积分；后续可按 platform 拆 PlatformConfig
  default-upload-cost: ${SAU_DEFAULT_UPLOAD_COST:20}
