server:
  port: 8080

spring:
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    open-in-view: false
  jackson:
    default-property-inclusion: non_null

logging:
  level:
    com.aistareco: INFO
    org.hibernate.SQL: WARN

aep:
  jwt:
    secret: ${AEP_JWT_SECRET:aep-dev-secret-key-change-in-prod-32chars}
    expiration-ms: ${AEP_JWT_EXPIRATION_MS:3600000}
