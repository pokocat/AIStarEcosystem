server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/aistareco;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  jackson:
    default-property-inclusion: non_null

logging:
  level:
    com.aistareco: INFO
    org.hibernate.SQL: WARN
